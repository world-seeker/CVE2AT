  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; background: #f4f4f4;
                  font-family: Arial, Helvetica, sans-serif; font-size: 15px; }

    /* ── Two-column app layout ── */
    .app { display: flex; height: 100vh; gap: 0; overflow: hidden; }

    /* ── Left: graph canvas ── */
    .graph-col {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
      border-right: 2px solid #d0d0d0;
    }
    .graph-header {
      padding: 10px 16px 8px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
    }
    .graph-header h1 { margin: 0 0 6px; font-size: 20px; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .legend-item {
      padding: 3px 10px; border-radius: 4px;
      font-size: 13px; border: 1px solid rgba(0,0,0,.12);
    }
    .svg-scroll {
      flex: 1 1 auto;
      overflow: auto;
      padding: 12px;
      background: #fafafa;
    }
    .svg-scroll svg {
      /* keep native Graphviz size; user can scroll / zoom */
      width: auto;
      height: auto;
      display: block;
      cursor: default;
    }
    /* highlight hovered node groups */
    .svg-scroll [data-node-id] { cursor: pointer; }
    .svg-scroll [data-node-id]:hover ellipse,
    .svg-scroll [data-node-id]:hover polygon,
    .svg-scroll [data-node-id]:hover path {
      filter: brightness(0.88);
    }
    .selected-node ellipse,
    .selected-node polygon,
    .selected-node path {
      stroke: #1a6fc4 !important;
      stroke-width: 3px !important;
    }
    .graph-footer {
      padding: 6px 16px;
      font-size: 13px;
      color: #666;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }

    /* ── Right: metadata panel ── */
    .panel-col {
      flex: 0 0 400px;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
      transition: flex-basis .2s;
    }
    .panel-col.hidden { flex: 0 0 0; overflow: hidden; }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #e0e0e0;
      background: #f8f8f8;
    }
    .panel-header h2 { margin: 0; font-size: 16px; }
    .close-btn {
      border: none; background: transparent;
      font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px;
      color: #555;
    }
    .close-btn:hover { color: #000; }
    .panel-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 14px;
    }
    .panel-placeholder {
      color: #888; font-style: italic; margin-top: 20px; text-align: center;
    }
    .node-label-heading {
      font-size: 17px; font-weight: 700;
      margin: 0 0 4px;
      word-break: break-word;
    }
    .node-type-badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      margin-bottom: 10px;
    }

    /* Metadata table */
    .meta-table {
      width: 100%; border-collapse: collapse;
      margin-top: 8px; font-size: 14px;
    }
    .meta-table th {
      text-align: left; padding: 6px 8px;
      background: #f3f3f3; border-bottom: 1px solid #e0e0e0;
      font-weight: 600; width: 36%; vertical-align: top;
      word-break: break-word;
    }
    .meta-table td {
      padding: 6px 8px; border-bottom: 1px solid #eee;
      vertical-align: top; word-break: break-word;
    }
    .meta-empty { color: #888; font-style: italic; }

    /* Badge colours by node type */
    .badge-root    { background: #FFD700; color: #5a4200; }
    .badge-tactic  { background: #98FB98; color: #1a5c1a; }
    .badge-cwe     { background: #ADD8E6; color: #1a3a5c; }
    .badge-tech    { background: #90EE90; color: #1a5c1a; }
    .badge-subtech { background: #FFFACD; color: #5c5000; }
    .badge-capec   { background: #FFB6C1; color: #6b0a1e; }
    .badge-gate    { background: #FFCCCB; color: #7a1a00; }
  </style>
</head>

var NODE_HTML  = {"root": "<table class='meta-table'><tr><th>label</th><td>Compromise Device</td></tr></table>", "t7_tactic": "<table class='meta-table'><tr><th>tactic</th><td>Collection</td></tr></table>", "t7_cwe_0": "<table class='meta-table'><tr><th>cwe_Name</th><td>Cleartext Storage of Sensitive Information</td></tr><tr><th>CVE ID</th><td>CVE-2014-5433</td></tr><tr><th>baseScore</th><td>9.8</td></tr><tr><th>baseSeverity</th><td>CRITICAL</td></tr><tr><th>attackVector</th><td>NETWORK</td></tr><tr><th>cwe_Abstraction</th><td>Base</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: OMISSION: This weakness is caused by missing a security tactic during the architecture and design phase.</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Confidentiality | Impact: Read Application Data | Note: An attacker with access to the system could read sensitive information stored in cleartext.</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Implementation | Description: N/A</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH</td></tr><tr><th>availabilityImpact</th><td>HIGH</td></tr><tr><th>exploitabilityScore</th><td>3.9</td></tr></table>", "t7_tech_0": "<table class='meta-table'><tr><th>technique_name</th><td>Data from Local System</td></tr><tr><th>CVE ID</th><td>CVE-2014-5433</td></tr><tr><th>tactics</th><td>Collection</td></tr><tr><th>tech_description</th><td>Adversaries may search local system sources, such as file systems and configuration files or local databases, to find files of interest and sensitive data prior to Exfiltration.\n\nAdversaries may do this using a [Command and Scripting Interpreter](https://attack.mitre.org/techniques/T1059), such as [cmd](https://attack.mitre.org/software/S0106) as well as a [Network Device CLI](https://attack.mitre.org/techniques/T1059/008), which have functionality to interact with the file system to gather information.(Citation: show_run_config_cmd_cisco) Adversaries may also use [Automated Collection](https://attack.mitre.org/techniques/T1119) on the local system.</td></tr><tr><th>detection</th><td>Monitor processes and command-line arguments for actions that could be taken to collect files from a system. Remote access tools with built-in features may interact directly with the Windows API to gather data. Further, [Network Device CLI](https://attack.mitre.org/techniques/T1059/008) commands may also be used to collect files such as configuration files with built-in features native to the network device platform.(Citation: Mandiant APT41 Global Intrusion )(Citation: US-CERT-TA18-106A) Monitor CLI activity for unexpected or unauthorized use commands being run by non-standard users from non-standard locations. Data may also be acquired through Windows system management tools such as [Windows Management Instrumentation](https://attack.mitre.org/techniques/T1047) and [PowerShell](https://attack.mitre.org/techniques/T1059/001).\n\nFor network infrastructure devices, collect AAA logging to monitor `show` commands that view configuration files.</td></tr><tr><th>platforms</th><td>Linux, Network, Windows, macOS</td></tr><tr><th>data sources</th><td>Command: Command Execution, File: File Access, Process: OS API Execution, Process: Process Creation, Script: Script Execution</td></tr></table>", "t7_cap_0": "<table class='meta-table'><tr><th>capec_Name</th><td>Retrieve Embedded Sensitive Data</td></tr><tr><th>CVE ID</th><td>CVE-2014-5433</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>Very High</td></tr><tr><th>capec_Skills_Required</th><td>Medium: The attacker must possess knowledge of client code structure as well as ability to reverse-engineer or decompile it or probe it in other ways. This knowledge is specific to the technology and language used for the client distribution</td></tr><tr><th>capec_Prerequisites</th><td>In order to feasibly execute this type of attack, some valuable data must be present in client software. || Additionally, this information must be unprotected, or protected in a flawed fashion, or through a mechanism that fails to resist reverse engineering, statistical, or other attack.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality | Impact: Read Data || Scope: Integrity | Impact: Modify Data || Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t7_cwe_1": "<table class='meta-table'><tr><th>cwe_Name</th><td>Cleartext Transmission of Sensitive Information</td></tr><tr><th>CVE ID</th><td>CVE-2020-12040</td></tr><tr><th>baseScore</th><td>9.8</td></tr><tr><th>baseSeverity</th><td>CRITICAL</td></tr><tr><th>attackVector</th><td>NETWORK</td></tr><tr><th>cwe_Abstraction</th><td>Base</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: OMISSION: This weakness is caused by missing a security tactic during the architecture and design phase. | Architecture and Design: For hardware, this may be introduced when design does not plan for an attacker having physical access while a legitimate user is remotely operating the device. | Operation: N/A | System Configuration: N/A</td></tr><tr><th>cwe_Likelihood_Of_Exploit</th><td>High</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Integrity, Confidentiality | Impact: Read Application Data, Modify Files or Directories | Note: Anyone can read the information by gaining access to the channel being used for communication.</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Architecture and Design | Description: N/A || Phase: Implementation | Description: N/A || Phase: Implementation | Description: N/A || Phase: Testing | Description: N/A || Phase: Operation | Description: N/A</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH</td></tr><tr><th>availabilityImpact</th><td>HIGH</td></tr><tr><th>exploitabilityScore</th><td>3.9</td></tr></table>", "t7_sub_1": "<table class='meta-table'><tr><th>technique_name</th><td>Input Capture</td></tr><tr><th>subtechnique_name</th><td>Input Capture: Credential API Hooking</td></tr><tr><th>tactics</th><td>Collection</td></tr><tr><th>detection</th><td>Monitor for calls to the `SetWindowsHookEx` and `SetWinEventHook` functions, which install a hook procedure.(Citation: Microsoft Hook Overview)(Citation: Volatility Detecting Hooks Sept 2012) Also consider analyzing hook chains (which hold pointers to hook procedures for each type of hook) using tools(Citation: Volatility Detecting Hooks Sept 2012)(Citation: PreKageo Winhook Jul 2011)(Citation: Jay GetHooks Sept 2011) or by programmatically examining internal kernel structures.(Citation: Zairon Hooking Dec 2006)(Citation: EyeofRa Detecting Hooking June 2017)\n\nRootkits detectors(Citation: GMER Rootkits) can also be used to monitor for various types of hooking activity.\n\nVerify integrity of live processes by comparing code in memory to that of corresponding static binaries, specifically checking for jumps and other instructions that redirect code flow. Also consider taking snapshots of newly started processes(Citation: Microsoft Process Snapshot) to compare the in-memory IAT to the real addresses of the referenced functions.(Citation: StackExchange Hooks Jul 2012)(Citation: Adlice Software IAT Hooks Oct 2014)</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>Process: OS API Execution, Process: Process Metadata</td></tr></table>", "t7_cap_1": "<table class='meta-table'><tr><th>capec_Name</th><td>Harvesting Information via API Event Monitoring</td></tr><tr><th>CVE ID</th><td>CVE-2020-12040</td></tr><tr><th>capec_Typical_Severity</th><td>Low</td></tr><tr><th>capec_Prerequisites</th><td>The target software is utilizing application framework APIs</td></tr><tr><th>capec_Mitigations</th><td>Leverage encryption techniques during information transactions so as to protect them from attack patterns of this kind.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality | Impact: Read Data</td></tr></table>", "t7_cwe_2": "<table class='meta-table'><tr><th>cwe_Name</th><td>Improper Authentication</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>baseScore</th><td>9.8</td></tr><tr><th>baseSeverity</th><td>CRITICAL</td></tr><tr><th>attackVector</th><td>NETWORK</td></tr><tr><th>cwe_Abstraction</th><td>Class</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: N/A | Implementation: REALIZATION: This weakness is caused during implementation of an architectural security tactic.</td></tr><tr><th>cwe_Likelihood_Of_Exploit</th><td>High</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Integrity, Confidentiality, Availability, Access Control | Impact: Read Application Data, Gain Privileges or Assume Identity, Execute Unauthorized Code or Commands | Note: This weakness can lead to the exposure of resources or functionality to unintended actors, possibly providing attackers with sensitive information or even execute arbitrary code.</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Architecture and Design | Description: N/A</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH</td></tr><tr><th>availabilityImpact</th><td>HIGH</td></tr><tr><th>exploitabilityScore</th><td>3.9</td></tr></table>", "t7_tech_2": "<table class='meta-table'><tr><th>technique_name</th><td>Browser Session Hijacking</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>tactics</th><td>Collection</td></tr><tr><th>tech_description</th><td>Adversaries may take advantage of security vulnerabilities and inherent functionality in browser software to change content, modify user-behaviors, and intercept information as part of various browser session hijacking techniques.(Citation: Wikipedia Man in the Browser)\n\nA specific example is when an adversary injects software into a browser that allows them to inherit cookies, HTTP sessions, and SSL client certificates of a user then use the browser as a way to pivot into an authenticated intranet.(Citation: Cobalt Strike Browser Pivot)(Citation: ICEBRG Chrome Extensions) Executing browser-based behaviors such as pivoting may require specific process permissions, such as &lt;code&gt;SeDebugPrivilege&lt;/code&gt; and/or high-integrity/administrator rights.\n\nAnother example involves pivoting browser traffic from the adversary&#x27;s browser through the user&#x27;s browser by setting up a proxy which will redirect web traffic. This does not alter the user&#x27;s traffic in any way, and the proxy connection can be severed as soon as the browser is closed. The adversary assumes the security context of whichever browser process the proxy is injected into. Browsers typically create a new process for each tab that is opened and permissions and certificates are separated accordingly. With these permissions, an adversary could potentially browse to any resource on an intranet, such as [Sharepoint](https://attack.mitre.org/techniques/T1213/002) or webmail, that is accessible through the browser and which the browser has sufficient permissions. Browser pivoting may also bypass security provided by 2-factor authentication.(Citation: cobaltstrike manual)</td></tr><tr><th>detection</th><td>This may be a difficult technique to detect because adversary traffic may be masked by normal user traffic. New processes may not be created and no additional software dropped to disk. Authentication logs can be used to audit logins to specific web applications, but determining malicious logins versus benign logins may be difficult if activity matches typical user behavior. Monitor for [Process Injection](https://attack.mitre.org/techniques/T1055) against browser applications.</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>Logon Session: Logon Session Creation, Process: Process Access, Process: Process Modification</td></tr><tr><th>permissions required</th><td>Administrator, SYSTEM</td></tr></table>", "t7_cap_2": "<table class='meta-table'><tr><th>capec_Name</th><td>Session Hijacking</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>Very High</td></tr><tr><th>capec_Skills_Required</th><td>Low: Exploiting a poorly protected identity token is a well understood attack with many helpful resources available.</td></tr><tr><th>capec_Prerequisites</th><td>An application that leverages sessions to perform authentication.</td></tr><tr><th>capec_Mitigations</th><td>Properly encrypt and sign identity tokens in transit, and use industry standard session key generation mechanisms that utilize high amount of entropy to generate the session key. Many standard web and application servers will perform this task on your behalf. Utilize a session timeout for all sessions. If the user does not explicitly logout, terminate their session after this period of inactivity. If the user logs back in then a new session key should be generated.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Integrity, Availability | Impact: Gain Privileges</td></tr></table>", "t7_tech_3": "<table class='meta-table'><tr><th>technique_name</th><td>Adversary-in-the-Middle</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>tactics</th><td>Collection</td></tr><tr><th>tech_description</th><td>Adversaries may attempt to position themselves between two or more networked devices using an adversary-in-the-middle (AiTM) technique to support follow-on behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040), [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002), or replay attacks ([Exploitation for Credential Access](https://attack.mitre.org/techniques/T1212)). By abusing features of common networking protocols that can determine the flow of network traffic (e.g. ARP, DNS, LLMNR, etc.), adversaries may force a device to communicate through an adversary controlled system so they can collect information or perform additional actions.(Citation: Rapid7 MiTM Basics)\n\nFor example, adversaries may manipulate victim DNS settings to enable other malicious activities such as preventing/redirecting users from accessing legitimate sites and/or pushing additional malware.(Citation: ttint_rat)(Citation: dns_changer_trojans)(Citation: ad_blocker_with_miner) Adversaries may also manipulate DNS and leverage their position in order to intercept user credentials, including access tokens ([Steal Application Access Token](https://attack.mitre.org/techniques/T1528)) and session cookies ([Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539)).(Citation: volexity_0day_sophos_FW)(Citation: Token tactics) [Downgrade Attack](https://attack.mitre.org/techniques/T1562/010)s can also be used to establish an AiTM position, such as by negotiating a less secure, deprecated, or weaker version of communication protocol (SSL/TLS) or encryption algorithm.(Citation: mitm_tls_downgrade_att)(Citation: taxonomy_downgrade_att_tls)(Citation: tlseminar_downgrade_att)\n\nAdversaries may also leverage the AiTM position to attempt to monitor and/or modify traffic, such as in [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002). Adversaries can setup a position similar to AiTM to prevent traffic from flowing to the appropriate destination, potentially to [Impair Defenses](https://attack.mitre.org/techniques/T1562) and/or in support of a [Network Denial of Service](https://attack.mitre.org/techniques/T1498).</td></tr><tr><th>detection</th><td>Monitor network traffic for anomalies associated with known AiTM behavior. Consider monitoring for modifications to system configuration files involved in shaping network traffic flow.</td></tr><tr><th>platforms</th><td>Linux, Network, Windows, macOS</td></tr><tr><th>data sources</th><td>Application Log: Application Log Content, Network Traffic: Network Traffic Content, Network Traffic: Network Traffic Flow, Service: Service Creation, Windows Registry: Windows Registry Key Modification</td></tr></table>", "t7_cap_3": "<table class='meta-table'><tr><th>capec_Name</th><td>Adversary in the Middle (AiTM)</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>Very High</td></tr><tr><th>capec_Skills_Required</th><td>Medium: This attack can get sophisticated since the attack may use cryptography.</td></tr><tr><th>capec_Prerequisites</th><td>There are two components communicating with each other. || An attacker is able to identify the nature and mechanism of communication between the two target components. || An attacker can eavesdrop on the communication between the target components. || Strong mutual authentication is not used between the two target components yielding opportunity for attacker interposition. || The communication occurs in clear (not encrypted) or with insufficient and spoofable encryption.</td></tr><tr><th>capec_Mitigations</th><td>Ensure Public Keys are signed by a Certificate Authority || Encrypt communications using cryptography (e.g., SSL/TLS) || Use Strong mutual authentication to always fully authenticate both ends of any communications channel. || Exchange public keys using a secure channel</td></tr><tr><th>capec_Consequences</th><td>Scope: Integrity | Impact: Modify Data || Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges || Scope: Confidentiality | Impact: Read Data</td></tr></table>"};

s the security context of whichever browser process the proxy is injected into. Browsers typically create a new process for each tab that is opened and permissions and certificates are separated accordingly. With these permissions, an adversary could potentially browse to any resource on an intranet, such as [Sharepoint](https://attack.mitre.org/techniques/T1213/002) or webmail, that is accessible through the browser and which the browser has sufficient permissions. Browser pivoting may also bypass security provided by 2-factor authentication.(Citation: cobaltstrike manual)", "detection": "This may be a difficult technique to detect because adversary traffic may be masked by normal user traffic. New processes may not be created and no additional software dropped to disk. Authentication logs can be used to audit logins to specific web applications, but determining malicious logins versus benign logins may be difficult if activity matches typical user behavior. Monitor for [Process Injection](https://attack.mitre.org/techniques/T1055) against browser applications.", "platforms": "Windows", "data sources": "Logon Session: Logon Session Creation, Process: Process Access, Process: Process Modification", "permissions required": "Administrator, SYSTEM"}}, {"id": "t7_cap_2", "label": "Session Hijacking", "type": "capec", "metadata": {"CVE ID": "CVE-2014-5432", "capec_Name": "Session Hijacking", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "Very High", "capec_Skills_Required": "Low: Exploiting a poorly protected identity token is a well understood attack with many helpful resources available.", "capec_Prerequisites": "An application that leverages sessions to perform authentication.", "capec_Mitigations": "Properly encrypt and sign identity tokens in transit, and use industry standard session key generation mechanisms that utilize high amount of entropy to generate the session key. Many standard web and application servers will perform this task on your behalf. Utilize a session timeout for all sessions. If the user does not explicitly logout, terminate their session after this period of inactivity. If the user logs back in then a new session key should be generated.", "capec_Consequences": "Scope: Confidentiality, Integrity, Availability | Impact: Gain Privileges"}}, {"id": "t7_and_2", "label": "AND", "type": "gate"}, {"id": "t7_tech_3", "label": "Adversary-in-the-Middle", "type": "tech", "metadata": {"CVE ID": "CVE-2014-5432", "technique_name": "Adversary-in-the-Middle", "tactics": "Collection", "tech_description": "Adversaries may attempt to position themselves between two or more networked devices using an adversary-in-the-middle (AiTM) technique to support follow-on behaviors such as [Network Sniffing](https://attack.mitre.org/techniques/T1040), [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002), or replay attacks ([Exploitation for Credential Access](https://attack.mitre.org/techniques/T1212)). By abusing features of common networking protocols that can determine the flow of network traffic (e.g. ARP, DNS, LLMNR, etc.), adversaries may force a device to communicate through an adversary controlled system so they can collect information or perform additional actions.(Citation: Rapid7 MiTM Basics)\n\nFor example, adversaries may manipulate victim DNS settings to enable other malicious activities such as preventing/redirecting users from accessing legitimate sites and/or pushing additional malware.(Citation: ttint_rat)(Citation: dns_changer_trojans)(Citation: ad_blocker_with_miner) Adversaries may also manipulate DNS and leverage their position in order to intercept user credentials, including access tokens ([Steal Application Access Token](https://attack.mitre.org/techniques/T1528)) and session cookies ([Steal Web Session Cookie](https://attack.mitre.org/techniques/T1539)).(Citation: volexity_0day_sophos_FW)(Citation: Token tactics) [Downgrade Attack](https://attack.mitre.org/techniques/T1562/010)s can also be used to establish an AiTM position, such as by negotiating a less secure, deprecated, or weaker version of communication protocol (SSL/TLS) or encryption algorithm.(Citation: mitm_tls_downgrade_att)(Citation: taxonomy_downgrade_att_tls)(Citation: tlseminar_downgrade_att)\n\nAdversaries may also leverage the AiTM position to attempt to monitor and/or modify traffic, such as in [Transmitted Data Manipulation](https://attack.mitre.org/techniques/T1565/002). Adversaries can setup a position similar to AiTM to prevent traffic from flowing to the appropriate destination, potentially to [Impair Defenses](https://attack.mitre.org/techniques/T1562) and/or in support of a [Network Denial of Service](https://attack.mitre.org/techniques/T1498).", "detection": "Monitor network traffic for anomalies associated with known AiTM behavior. Consider monitoring for modifications to system configuration files involved in shaping network traffic flow.", "platforms": "Linux, Network, Windows, macOS", "data sources": "Application Log: Application Log Content, Network Traffic: Network Traffic Content, Network Traffic: Network Traffic Flow, Service: Service Creation, Windows Registry: Windows Registry Key Modification"}}, {"id": "t7_cap_3", "label": "Adversary in the Middle (AiTM)", "type": "capec", "metadata": {"CVE ID": "CVE-2014-5432", "capec_Name": "Adversary in the Middle (AiTM)", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "Very High", "capec_Skills_Required": "Medium: This attack can get sophisticated since the attack may use cryptography.", "capec_Prerequisites": "There are two components communicating with each other. || An attacker is able to identify the nature and mechanism of communication between the two target components. || An attacker can eavesdrop on the communication between the target components. || Strong mutual authentication is not used between the two target components yielding opportunity for attacker interposition. || The communication occurs in clear (not encrypted) or with insufficient and spoofable encryption.", "capec_Mitigations": "Ensure Public Keys are signed by a Certificate Authority || Encrypt communications using cryptography (e.g., SSL/TLS) || Use Strong mutual authentication to always fully authenticate both ends of any communications channel. || Exchange public keys using a secure channel", "capec_Consequences": "Scope: Integrity | Impact: Modify Data || Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges || Scope: Confidentiality | Impact: Read Data"}}, {"id": "t7_and_3", "label": "AND", "type": "gate"}, {"id": "t7_cwe2_or_4", "label": "OR", "type": "gate"}, {"id": "t7_tac_or_5", "label": "OR", "type": "gate"}, {"id": "t7_tac_or_6", "label": "OR", "type": "gate"}];

// Build lookup: node_id -> {label, type}
var nodeInfo = {};
NODES_DATA.forEach(function(n) { nodeInfo[n.id] = n; });

// ── DOM refs ─────────────────────────────────────────────────────────────────
var panelCol  = document.getElementById('panel-col');
var panelBody = document.getElementById('panel-body');
var panelTitle= document.getElementById('panel-title');
var closeBtn  = document.getElementById('close-btn');
var svgScroll = document.getElementById('svg-scroll');

var selectedGroup = null;

// ── Open panel with node data ─────────────────────────────────────────────────
function showPanel(nodeId) {
  var info    = nodeInfo[nodeId] || {};
  var label   = info.label  || nodeId;
  var ntype   = info.type   || 'unknown';
  var htmlTbl = NODE_HTML[nodeId] || '<div class="meta-empty">No metadata recorded for this node.</div>';

  panelTitle.textContent = 'Node metadata';

  var badgeClass = 'badge-' + ntype;
  panelBody.innerHTML =
    '<p class="node-label-heading">' + escHtml(label) + '</p>' +
    '<span class="node-type-badge ' + badgeClass + '">' + escHtml(ntype) + '</span>' +
    htmlTbl;

  panelCol.classList.remove('hidden');
}

function closePanel() {
  panelCol.classList.add('hidden');
  if (selectedGroup) {
    selectedGroup.classList.remove('selected-node');
    selectedGroup = null;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Wire up node clicks ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var groups = svgScroll.querySelectorAll('[data-node-id]');
  groups.forEach(function(g) {
    g.addEventListener('click', function(ev) {
      ev.stopPropagation();
      var nodeId = g.getAttribute('data-node-id');

      // Deselect previous
      if (selectedGroup && selectedGroup !== g) {
        selectedGroup.classList.remove('selected-node');
      }
      // Toggle if same node clicked twice
      if (selectedGroup === g) {
        closePanel();
        return;
      }
      selectedGroup = g;
      g.classList.add('selected-node');
      showPanel(nodeId);
    });
  });

  // Click empty canvas area → close panel
  svgScroll.addEventListener('click', function() { closePanel(); });

  closeBtn.addEventListener('click', closePanel);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePanel();
  });
});
</script>
