<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Attack Tree — Persistence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; background: #f4f4f4;
                  font-family: Arial, Helvetica, sans-serif; font-size: 15px; }

    /* ── Two-column app layout ── */
    .app { display: flex; height: 100vh; gap: 0; overflow: hidden; }

    /* ── Left: graph canvas ── */
    .graph-col {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
      border-right: 2px solid #d0d0d0;
    }
    .graph-header {
      padding: 10px 16px 8px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
    }
    .graph-header h1 { margin: 0 0 6px; font-size: 20px; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .legend-item {
      padding: 3px 10px; border-radius: 4px;
      font-size: 13px; border: 1px solid rgba(0,0,0,.12);
    }
    .svg-scroll {
      flex: 1 1 auto;
      overflow: auto;
      padding: 12px;
      background: #fafafa;
    }
    .svg-scroll svg {
      /* keep native Graphviz size; user can scroll / zoom */
      width: auto;
      height: auto;
      display: block;
      cursor: default;
    }
    /* highlight hovered node groups */
    .svg-scroll [data-node-id] { cursor: pointer; }
    .svg-scroll [data-node-id]:hover ellipse,
    .svg-scroll [data-node-id]:hover polygon,
    .svg-scroll [data-node-id]:hover path {
      filter: brightness(0.88);
    }
    .selected-node ellipse,
    .selected-node polygon,
    .selected-node path {
      stroke: #1a6fc4 !important;
      stroke-width: 3px !important;
    }
    .graph-footer {
      padding: 6px 16px;
      font-size: 13px;
      color: #666;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }

    /* ── Right: metadata panel ── */
    .panel-col {
      flex: 0 0 400px;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
      transition: flex-basis .2s;
    }
    .panel-col.hidden { flex: 0 0 0; overflow: hidden; }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #e0e0e0;
      background: #f8f8f8;
    }
    .panel-header h2 { margin: 0; font-size: 16px; }
    .close-btn {
      border: none; background: transparent;
      font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px;
      color: #555;
    }
    .close-btn:hover { color: #000; }
    .panel-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 14px;
    }
    .panel-placeholder {
      color: #888; font-style: italic; margin-top: 20px; text-align: center;
    }
    .node-label-heading {
      font-size: 17px; font-weight: 700;
      margin: 0 0 4px;
      word-break: break-word;
    }
    .node-type-badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      margin-bottom: 10px;
    }

    /* Metadata table */
    .meta-table {
      width: 100%; border-collapse: collapse;
      margin-top: 8px; font-size: 14px;
    }
    .meta-table th {
      text-align: left; padding: 6px 8px;
      background: #f3f3f3; border-bottom: 1px solid #e0e0e0;
      font-weight: 600; width: 36%; vertical-align: top;
      word-break: break-word;
    }
    .meta-table td {
      padding: 6px 8px; border-bottom: 1px solid #eee;
      vertical-align: top; word-break: break-word;
    }
    .meta-empty { color: #888; font-style: italic; }

    /* Badge colours by node type */
    .badge-root    { background: #FFD700; color: #5a4200; }
    .badge-tactic  { background: #98FB98; color: #1a5c1a; }
    .badge-cwe     { background: #ADD8E6; color: #1a3a5c; }
    .badge-tech    { background: #90EE90; color: #1a5c1a; }
    .badge-subtech { background: #FFFACD; color: #5c5000; }
    .badge-capec   { background: #FFB6C1; color: #6b0a1e; }
    .badge-gate    { background: #FFCCCB; color: #7a1a00; }
  </style>
</head>

var NODE_HTML  = {"root": "<table class='meta-table'><tr><th>label</th><td>Compromise Device</td></tr></table>", "t1_tactic": "<table class='meta-table'><tr><th>tactic</th><td>Persistence</td></tr></table>", "t1_cwe_0": "<table class='meta-table'><tr><th>cwe_Name</th><td>Incorrect Permission Assignment for Critical Resource</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>baseScore</th><td>9.4</td></tr><tr><th>baseSeverity</th><td>CRITICAL</td></tr><tr><th>attackVector</th><td>NETWORK</td></tr><tr><th>cwe_Abstraction</th><td>Class</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: N/A | Implementation:  | Installation: The developer may set loose permissions in order to minimize problems when the user first runs the program, then create documentation stating that permissions should be tightened. Since system administrators and users do not always read the documentation, this can result in insecure permissions being left unchanged. | Operation: N/A</td></tr><tr><th>cwe_Likelihood_Of_Exploit</th><td>High</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Confidentiality | Impact: Read Application Data, Read Files or Directories | Note: An attacker may be able to read sensitive information from the associated resource, such as credentials or configuration information stored in a file. || Scope: Access Control | Impact: Gain Privileges or Assume Identity | Note: An attacker may be able to modify critical properties of the associated resource to gain privileges, such as replacing a world-writable executable with a Trojan horse. || Scope: Integrity, Other | Impact: Modify Application Data, Other | Note: An attacker may be able to destroy or corrupt critical data in the associated resource, such as deletion of records from a database.</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Implementation | Description: N/A || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: Run the code in a &quot;jail&quot; or similar sandbox environment that enforces strict boundaries between the process and the operating system. This may effectively restrict which files can be accessed in a particular directory or which commands can be executed by the software. OS-level examples include the Unix chroot jail, AppArmor, and SELinux. In general, managed code may provide some protection. For example, java.io.FilePermission in the Java SecurityManager allows the software to specify restrictions on file operations. This may not be a feasible solution, and it only limits the impact to the operating system; the rest of the application may still be subject to compromise. Be careful to avoid CWE-243 and other weaknesses related to jails. || Phase: Implementation | Description: N/A || Phase: System Configuration | Description: N/A || Phase: Documentation | Description: N/A || Phase: Installation | Description: N/A || Phase: Operation | Description: N/A || Phase: Implementation | Description: N/A</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH</td></tr><tr><th>availabilityImpact</th><td>HIGH</td></tr><tr><th>exploitabilityScore</th><td>3.9</td></tr></table>", "t1_sub_0": "<table class='meta-table'><tr><th>technique_name</th><td>Hijack Execution Flow</td></tr><tr><th>subtechnique_name</th><td>Hijack Execution Flow: Services File Permissions Weakness</td></tr><tr><th>tactics</th><td>Persistence</td></tr><tr><th>detection</th><td>Look for changes to binaries and service executables that may normally occur during software updates. If an executable is written, renamed, and/or moved to match an existing service executable, it could be detected and correlated with other suspicious behavior. Hashing of binaries and service executables could be used to detect replacement against historical data.\n\nLook for abnormal process call trees from typical processes and services and for execution of other commands that could relate to Discovery or other adversary techniques.</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>File: File Creation, File: File Modification, Process: Process Creation, Service: Service Metadata</td></tr></table>", "t1_cap_0": "<table class='meta-table'><tr><th>capec_Name</th><td>Accessing Functionality Not Properly Constrained by ACLs</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Skills_Required</th><td>Low: In order to discover unrestricted resources, the attacker does not need special tools or skills. They only have to observe the resources or access mechanisms invoked as each action is performed and then try and access those access mechanisms directly.</td></tr><tr><th>capec_Prerequisites</th><td>The application must be navigable in a manner that associates elements (subsections) of the application with ACLs. || The various resources, or individual URLs, must be somehow discoverable by the attacker || The administrator must have forgotten to associate an ACL or has associated an inappropriately permissive ACL with a particular navigable resource.</td></tr><tr><th>capec_Mitigations</th><td>In a J2EE setting, administrators can associate a role that is impossible for the authenticator to grant users, such as &quot;NoAccess&quot;, with all Servlets to which access is guarded by a limited number of servlets visible to, and accessible by, the user. Having done so, any direct access to those protected Servlets will be prohibited by the web container. In a more general setting, the administrator must mark every resource besides the ones supposed to be exposed to the user as accessible by a role impossible for the user to assume. The default security setting must be to deny access and then grant access only to those resources intended by business logic.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t1_sub_1": "<table class='meta-table'><tr><th>technique_name</th><td>Hijack Execution Flow</td></tr><tr><th>subtechnique_name</th><td>Hijack Execution Flow: Executable Installer File Permissions Weakness</td></tr><tr><th>tactics</th><td>Persistence</td></tr><tr><th>detection</th><td>Look for changes to binaries and service executables that may normally occur during software updates. If an executable is written, renamed, and/or moved to match an existing service executable, it could be detected and correlated with other suspicious behavior. Hashing of binaries and service executables could be used to detect replacement against historical data.\n\nLook for abnormal process call trees from typical processes and services and for execution of other commands that could relate to Discovery or other adversary techniques.</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>File: File Creation, File: File Modification, Module: Module Load, Process: Process Creation, Service: Service Metadata</td></tr></table>", "t1_cap_1": "<table class='meta-table'><tr><th>capec_Name</th><td>Accessing Functionality Not Properly Constrained by ACLs</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Skills_Required</th><td>Low: In order to discover unrestricted resources, the attacker does not need special tools or skills. They only have to observe the resources or access mechanisms invoked as each action is performed and then try and access those access mechanisms directly.</td></tr><tr><th>capec_Prerequisites</th><td>The application must be navigable in a manner that associates elements (subsections) of the application with ACLs. || The various resources, or individual URLs, must be somehow discoverable by the attacker || The administrator must have forgotten to associate an ACL or has associated an inappropriately permissive ACL with a particular navigable resource.</td></tr><tr><th>capec_Mitigations</th><td>In a J2EE setting, administrators can associate a role that is impossible for the authenticator to grant users, such as &quot;NoAccess&quot;, with all Servlets to which access is guarded by a limited number of servlets visible to, and accessible by, the user. Having done so, any direct access to those protected Servlets will be prohibited by the web container. In a more general setting, the administrator must mark every resource besides the ones supposed to be exposed to the user as accessible by a role impossible for the user to assume. The default security setting must be to deny access and then grant access only to those resources intended by business logic.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t1_sub_2": "<table class='meta-table'><tr><th>technique_name</th><td>Server Software Component</td></tr><tr><th>subtechnique_name</th><td>Server Software Component: Terminal Services DLL</td></tr><tr><th>tactics</th><td>Persistence</td></tr><tr><th>detection</th><td>Monitor for changes to Registry keys associated with &lt;code&gt;ServiceDll&lt;/code&gt; and other subkey values under &lt;code&gt;HKLM\\System\\CurrentControlSet\\services\\TermService\\Parameters\\&lt;/code&gt;.\n\nMonitor unexpected changes and/or interactions with &lt;code&gt;termsrv.dll&lt;/code&gt;, which is typically stored in &lt;code&gt;%SystemRoot%\\System32\\&lt;/code&gt;.\n\nMonitor commands as well as  processes and arguments for potential adversary actions to modify Registry values (ex: &lt;code&gt;reg.exe&lt;/code&gt;) or modify/replace the legitimate &lt;code&gt;termsrv.dll&lt;/code&gt;.\n\nMonitor module loads by the Terminal Services process (ex: &lt;code&gt;svchost.exe -k termsvcs&lt;/code&gt;) for unexpected DLLs (the default is &lt;code&gt;%SystemRoot%\\System32\\termsrv.dll&lt;/code&gt;, though an adversary could also use [Match Legitimate Name or Location](https://attack.mitre.org/techniques/T1036/005) on a malicious payload).</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>Command: Command Execution, File: File Modification, Module: Module Load, Process: Process Creation, Windows Registry: Windows Registry Key Modification</td></tr></table>", "t1_cap_2": "<table class='meta-table'><tr><th>capec_Name</th><td>Replace Binaries</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Prerequisites</th><td>The attacker must be able to place the malicious binary on the target machine.</td></tr><tr><th>capec_Mitigations</th><td>Insure that binaries commonly used by the system have the correct file permissions. Set operating system policies that restrict privilege elevation of non-Administrators. Use auditing tools to observe changes to system services.</td></tr></table>", "t1_tech_3": "<table class='meta-table'><tr><th>technique_name</th><td>Compromise Host Software Binary</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>tactics</th><td>Persistence</td></tr><tr><th>tech_description</th><td>Adversaries may modify host software binaries to establish persistent access to systems. Software binaries/executables provide a wide range of system commands or services, programs, and libraries. Common software binaries are SSH clients, FTP clients, email clients, web browsers, and many other user or server applications.\n\nAdversaries may establish persistence though modifications to host software binaries. For example, an adversary may replace or otherwise infect a legitimate application binary (or support files) with a backdoor. Since these binaries may be routinely executed by applications or the user, the adversary can leverage this for persistent access to the host. An adversary may also modify a software binary such as an SSH client in order to persistently collect credentials during logins (i.e., [Modify Authentication Process](https://attack.mitre.org/techniques/T1556)).(Citation: Google Cloud Mandiant UNC3886 2024)\n\nAn adversary may also modify an existing binary by patching in malicious functionality (e.g., IAT Hooking/Entry point patching)(Citation: Unit42 Banking Trojans Hooking 2022) prior to the binary\u2019s legitimate execution. For example, an adversary may modify the entry point of a binary to point to malicious code patched in by the adversary before resuming normal execution flow.(Citation: ESET FontOnLake Analysis 2021)\n\nAfter modifying a binary, an adversary may attempt to [Impair Defenses](https://attack.mitre.org/techniques/T1562) by preventing it from updating (e.g., via the `yum-versionlock` command or `versionlock.list` file in Linux systems that use the yum package manager).(Citation: Google Cloud Mandiant UNC3886 2024)</td></tr><tr><th>detection</th><td>Collect and analyze signing certificate metadata and check signature validity on software that executes within the environment. Look for changes to client software that do not correlate with known software or patch cycles. \n\nConsider monitoring for anomalous behavior from client applications, such as atypical module loads, file reads/writes, or network connections.</td></tr><tr><th>platforms</th><td>Linux, Windows, macOS</td></tr><tr><th>data sources</th><td>File: File Creation, File: File Deletion, File: File Metadata, File: File Modification</td></tr></table>", "t1_cap_3": "<table class='meta-table'><tr><th>capec_Name</th><td>Replace Binaries</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Prerequisites</th><td>The attacker must be able to place the malicious binary on the target machine.</td></tr><tr><th>capec_Mitigations</th><td>Insure that binaries commonly used by the system have the correct file permissions. Set operating system policies that restrict privilege elevation of non-Administrators. Use auditing tools to observe changes to system services.</td></tr></table>", "t1_cwe_1": "<table class='meta-table'><tr><th>cwe_Name</th><td>Use of Hard-coded Credentials</td></tr><tr><th>CVE ID</th><td>CVE-2014-5434 | CVE-2020-12047 | CVE-2014-5431 | CVE-2020-12045 | CVE-2020-12039</td></tr><tr><th>baseScore</th><td>9.8 | 6.8 | 2.4</td></tr><tr><th>baseSeverity</th><td>CRITICAL | MEDIUM | LOW</td></tr><tr><th>attackVector</th><td>NETWORK | PHYSICAL</td></tr><tr><th>cwe_Abstraction</th><td>Base</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: REALIZATION: This weakness is caused during implementation of an architectural security tactic.</td></tr><tr><th>cwe_Likelihood_Of_Exploit</th><td>High</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Access Control | Impact: Bypass Protection Mechanism | Note: N/A || Scope: Integrity, Confidentiality, Availability, Access Control, Other | Impact: Read Application Data, Gain Privileges or Assume Identity, Execute Unauthorized Code or Commands, Other | Note: N/A</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Architecture and Design | Description: For outbound authentication: store passwords, keys, and other credentials outside of the code in a strongly-protected, encrypted configuration file or database that is protected from access by all outsiders, including other local users on the same system. Properly protect the key (CWE-320). If you cannot use encryption to protect the file, then make sure that the permissions are as restrictive as possible [REF-7]. In Windows environments, the Encrypted File System (EFS) may provide some protection. || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: For inbound authentication using passwords: apply strong one-way hashes to passwords and store those hashes in a configuration file or database with appropriate access control. That way, theft of the file/database still requires the attacker to try to crack the password. When handling an incoming password during authentication, take the hash of the password and compare it to the saved hash. Use randomly assigned salts for each separate hash that is generated. This increases the amount of computation that an attacker needs to conduct a brute-force attack, possibly limiting the effectiveness of the rainbow table method. || Phase: Architecture and Design | Description: For front-end to back-end connections: Three solutions are possible, although none are complete.</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH | LOW</td></tr><tr><th>availabilityImpact</th><td>HIGH | NONE</td></tr><tr><th>exploitabilityScore</th><td>3.9 | 0.9</td></tr></table>", "t1_sub_7": "<table class='meta-table'><tr><th>technique_name</th><td>Valid Accounts</td></tr><tr><th>subtechnique_name</th><td>Valid Accounts: Default Accounts</td></tr><tr><th>tactics</th><td>Persistence</td></tr><tr><th>detection</th><td>Monitor whether default accounts have been activated or logged into. These audits should also include checks on any appliances and applications for default credentials or SSH keys, and if any are discovered, they should be updated immediately.</td></tr><tr><th>platforms</th><td>Containers, IaaS, Identity Provider, Linux, Network, Office Suite, SaaS, Windows, macOS</td></tr><tr><th>data sources</th><td>Logon Session: Logon Session Creation, User Account: User Account Authentication</td></tr></table>", "t1_cap_7": "<table class='meta-table'><tr><th>capec_Name</th><td>Try Common or Default Usernames and Passwords</td></tr><tr><th>CVE ID</th><td>CVE-2014-5434 | CVE-2020-12047 | CVE-2014-5431 | CVE-2020-12045 | CVE-2020-12039</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>Medium</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Skills_Required</th><td>Low: An adversary just needs to gain access to common default usernames/passwords specific to the technologies used by the system. Additionally, a brute force attack leveraging common passwords can be easily realized if the user name is known.</td></tr><tr><th>capec_Prerequisites</th><td>The system uses one factor password based authentication.The adversary has the means to interact with the system.</td></tr><tr><th>capec_Mitigations</th><td>Delete all default account credentials that may be put in by the product vendor. || Implement a password throttling mechanism. This mechanism should take into account both the IP address and the log in name of the user. || Put together a strong password policy and make sure that all user created passwords comply with it. Alternatively automatically generate strong passwords for users. || Passwords need to be recycled to prevent aging, that is every once in a while a new password must be chosen.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t1_cwe_2": "<table class='meta-table'><tr><th>cwe_Name</th><td>Improper Authentication</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>baseScore</th><td>9.8</td></tr><tr><th>baseSeverity</th><td>CRITICAL</td></tr><tr><th>attackVector</th><td>NETWORK</td></tr><tr><th>cwe_Abstraction</th><td>Class</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: N/A | Implementation: REALIZATION: This weakness is caused during implementation of an architectural security tactic.</td></tr><tr><th>cwe_Likelihood_Of_Exploit</th><td>High</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Integrity, Confidentiality, Availability, Access Control | Impact: Read Application Data, Gain Privileges or Assume Identity, Execute Unauthorized Code or Commands | Note: This weakness can lead to the exposure of resources or functionality to unintended actors, possibly providing attackers with sensitive information or even execute arbitrary code.</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Architecture and Design | Description: N/A</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH</td></tr><tr><th>availabilityImpact</th><td>HIGH</td></tr><tr><th>exploitabilityScore</th><td>3.9</td></tr></table>", "t1_sub_8": "<table class='meta-table'><tr><th>technique_name</th><td>Server Software Component</td></tr><tr><th>subtechnique_name</th><td>Server Software Component: Web Shell</td></tr><tr><th>tactics</th><td>Persistence</td></tr><tr><th>detection</th><td>Web shells can be difficult to detect. Unlike other forms of persistent remote access, they do not initiate connections. The portion of the Web shell that is on the server may be small and innocuous looking. The PHP version of the China Chopper Web shell, for example, is the following short payload: (Citation: Lee 2013) \n\n&lt;code&gt;&amp;lt;?php @eval($_POST[&#x27;password&#x27;]);&amp;gt;&lt;/code&gt;\n\nNevertheless, detection mechanisms exist. Process monitoring may be used to detect Web servers that perform suspicious actions such as spawning cmd.exe or accessing files that are not in the Web directory.(Citation: NSA Cyber Mitigating Web Shells)\n\nFile monitoring may be used to detect changes to files in the Web directory of a Web server that do not match with updates to the Web server&#x27;s content and may indicate implantation of a Web shell script.(Citation: NSA Cyber Mitigating Web Shells)\n\nLog authentication attempts to the server and any unusual traffic patterns to or from the server and internal network. (Citation: US-CERT Alert TA15-314A Web Shells)</td></tr><tr><th>platforms</th><td>Linux, Network, Windows, macOS</td></tr><tr><th>data sources</th><td>Application Log: Application Log Content, File: File Creation, File: File Modification, Network Traffic: Network Traffic Content, Network Traffic: Network Traffic Flow, Process: Process Creation</td></tr></table>", "t1_cap_8": "<table class='meta-table'><tr><th>capec_Name</th><td>Upload a Web Shell to a Web Server</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Prerequisites</th><td>The web server is susceptible to one of the various web application exploits that allows for uploading a shell file.</td></tr><tr><th>capec_Mitigations</th><td>Make sure your web server is up-to-date with all patches to protect against known vulnerabilities. || Ensure that the file permissions in directories on the web server from which files can be execute is set to the &quot;least privilege&quot; settings, and that those directories contents is controlled by an allowlist.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality | Impact: Read Data || Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges || Scope: Confidentiality, Integrity, Availability | Impact: Execute Unauthorized Commands</td></tr></table>"};
var NODES_DATA = [{"id": "root", "label": "Compromise Device", "type": "root"}, {"id": "t1_tactic", "label": "Persistence", "type": "tactic", "metadata": {"tactic": "Persistence"}}, {"id": "t1_cwe_0", "label": "Incorrect Permission Assignment for Critical Resource", "type": "cwe", "metadata": {"CVE ID": "CVE-2020-12041", "cwe_Name": "Incorrect Permission Assignment for Critical Resource", "cwe_Abstraction": "Class", "cwe_Modes_Of_Introduction": "Architecture and Design: N/A | Implementation:  | Installation: The developer may set loose permissions in order to minimize problems when the user first runs the program, then create documentation stating that permissions should be tightened. Since system administrators and users do not always read the documentation, this can result in insecure permissions being left unchanged. | Operation: N/A", "cwe_Likelihood_Of_Exploit": "High", "cwe_Common_Consequences": "Scope: Confidentiality | Impact: Read Application Data, Read Files or Directories | Note: An attacker may be able to read sensitive information from the associated resource, such as credentials or configuration information stored in a file. || Scope: Access Control | Impact: Gain Privileges or Assume Identity | Note: An attacker may be able to modify critical properties of the associated resource to gain privileges, such as replacing a world-writable executable with a Trojan horse. || Scope: Integrity, Other | Impact: Modify Application Data, Other | Note: An attacker may be able to destroy or corrupt critical data in the associated resource, such as deletion of records from a database.", "cwe_Potential_Mitigations": "Phase: Implementation | Description: N/A || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: Run the code in a \"jail\" or similar sandbox environment that enforces strict boundaries between the process and the operating system. This may effectively restrict which files can be accessed in a particular directory or which commands can be executed by the software. OS-level examples include the Unix chroot jail, AppArmor, and SELinux. In general, managed code may provide some protection. For example, java.io.FilePermission in the Java SecurityManager allows the software to specify restrictions on file operations. This may not be a feasible solution, and it only limits the impact to the operating system; the rest of the application may still be subject to compromise. Be careful to avoid CWE-243 and other weaknesses related to jails. || Phase: Implementation | Description: N/A || Phase: System Configuration | Description: N/A || Phase: Documentation | Description: N/A || Phase: Installation | Description: N/A || Phase: Operation | Description: N/A || Phase: Implementation | Description: N/A", "attackVector": "NETWORK", "baseScore": "9.4", "baseSeverity": "CRITICAL", "attackComplexity": "LOW", "privilegesRequired": "NONE", "userInteraction": "NONE", "confidentialityImpact": "HIGH", "availabilityImpact": "HIGH", "exploitabilityScore": "3.9"}}, {"id": "t1_sub_0", "label": "Hijack Execution Flow: Services File Permissions Weakness", "type": "subtech", "metadata": {"subtechnique_name": "Hijack Execution Flow: Services File Permissions Weakness", "technique_name": "Hijack Execution Flow", "tactics": "Persistence", "detection": "Look for changes to binaries and service executables that may normally occur during software updates. If an executable is written, renamed, and/or moved to match an existing service executable, it could be detected and correlated with other suspicious behavior. Hashing of binaries and service executables could be used to detect replacement against historical data.\n\nLook for abnormal process call trees from typical processes and services and for execution of other commands that could relate to Discovery or other adversary techniques.", "platforms": "Windows", "data sources": "File: File Creation, File: File Modification, Process: Process Creation, Service: Service Metadata"}}, {"id": "t1_cap_0", "label": "Accessing Functionality Not Properly Constrained by ACLs", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Accessing Functionality Not Properly Constrained by ACLs", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "High", "capec_Skills_Required": "Low: In order to discover unrestricted resources, the attacker does not need special tools or skills. They only have to observe the resources or access mechanisms invoked as each action is performed and then try and access those access mechanisms directly.", "capec_Prerequisites": "The application must be navigable in a manner that associates elements (subsections) of the application with ACLs. || The various resources, or individual URLs, must be somehow discoverable by the attacker || The administrator must have forgotten to associate an ACL or has associated an inappropriately permissive ACL with a particular navigable resource.", "capec_Mitigations": "In a J2EE setting, administrators can associate a role that is impossible for the authenticator to grant users, such as \"NoAccess\", with all Servlets to which access is guarded by a limited number of servlets visible to, and accessible by, the user. Having done so, any direct access to those protected Servlets will be prohibited by the web container. In a more general setting, the administrator must mark every resource besides the ones supposed to be exposed to the user as accessible by a role impossible for the user to assume. The default security setting must be to deny access and then grant access only to those resources intended by business logic.", "capec_Consequences": "Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges"}}, {"id": "t1_and_0", "label": "AND", "type": "gate"}, {"id": "t1_sub_1", "label": "Hijack Execution Flow: Executable Installer File Permissions Weakness", "type": "subtech", "metadata": {"subtechnique_name": "Hijack Execution Flow: Executable Installer File Permissions Weakness", "technique_name": "Hijack Execution Flow", "tactics": "Persistence", "detection": "Look for changes to binaries and service executables that may normally occur during software updates. If an executable is written, renamed, and/or moved to match an existing service executable, it could be detected and correlated with other suspicious behavior. Hashing of binaries and service executables could be used to detect replacement against historical data.\n\nLook for abnormal process call trees from typical processes and services and for execution of other commands that could relate to Discovery or other adversary techniques.", "platforms": "Windows", "data sources": "File: File Creation, File: File Modification, Module: Module Load, Process: Process Creation, Service: Service Metadata"}}, {"id": "t1_cap_1", "label": "Accessing Functionality Not Properly Constrained by ACLs", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Accessing Functionality Not Properly Constrained by ACLs", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "High", "capec_Skills_Required": "Low: In order to discover unrestricted resources, the attacker does not need special tools or skills. They only have to observe the resources or access mechanisms invoked as each action is performed and then try and access those access mechanisms directly.", "capec_Prerequisites": "The application must be navigable in a manner that associates elements (subsections) of the application with ACLs. || The various resources, or individual URLs, must be somehow discoverable by the attacker || The administrator must have forgotten to associate an ACL or has associated an inappropriately permissive ACL with a particular navigable resource.", "capec_Mitigations": "In a J2EE setting, administrators can associate a role that is impossible for the authenticator to grant users, such as \"NoAccess\", with all Servlets to which access is guarded by a limited number of servlets visible to, and accessible by, the user. Having done so, any direct access to those protected Servlets will be prohibited by the web container. In a more general setting, the administrator must mark every resource besides the ones supposed to be exposed to the user as accessible by a role impossible for the user to assume. The default security setting must be to deny access and then grant access only to those resources intended by business logic.", "capec_Consequences": "Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges"}}, {"id": "t1_and_1", "label": "AND", "type": "gate"}, {"id": "t1_sub_2", "label": "Server Software Component: Terminal Services DLL", "type": "subtech", "metadata": {"subtechnique_name": "Server Software Component: Terminal Services DLL", "technique_name": "Server Software Component", "tactics": "Persistence", "detection": "Monitor for changes to Registry keys associated with <code>ServiceDll</code> and other subkey values under <code>HKLM\\System\\CurrentControlSet\\services\\TermService\\Parameters\\</code>.\n\nMonitor unexpected changes and/or interactions with <code>termsrv.dll</code>, which is typically stored in <code>%SystemRoot%\\System32\\</code>.\n\nMonitor commands as well as  processes and arguments for potential adversary actions to modify Registry values (ex: <code>reg.exe</code>) or modify/replace the legitimate <code>termsrv.dll</code>.\n\nMonitor module loads by the Terminal Services process (ex: <code>svchost.exe -k termsvcs</code>) for unexpected DLLs (the default is <code>%SystemRoot%\\System32\\termsrv.dll</code>, though an adversary could also use [Match Legitimate Name or Location](https://attack.mitre.org/techniques/T1036/005) on a malicious payload).", "platforms": "Windows", "data sources": "Command: Command Execution, File: File Modification, Module: Module Load, Process: Process Creation, Windows Registry: Windows Registry Key Modification"}}, {"id": "t1_cap_2", "label": "Replace Binaries", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Replace Binaries", "capec_Typical_Severity": "High", "capec_Prerequisites": "The attacker must be able to place the malicious binary on the target machine.", "capec_Mitigations": "Insure that binaries commonly used by the system have the correct file permissions. Set operating system policies that restrict privilege elevation of non-Administrators. Use auditing tools to observe changes to system services."}}, {"id": "t1_and_2", "label": "AND", "type": "gate"}, {"id": "t1_tech_3", "label": "Compromise Host Software Binary", "type": "tech", "metadata": {"CVE ID": "CVE-2020-12041", "technique_name": "Compromise Host Software Binary", "tactics": "Persistence", "tech_description": "Adversaries may modify host software binaries to establish persistent access to systems. Software binaries/executables provide a wide range of system commands or services, programs, and libraries. Common software binaries are SSH clients, FTP clients, email clients, web browsers, and many other user or server applications.\n\nAdversaries may establish persistence though modifications to host software binaries. For example, an adversary may replace or otherwise infect a legitimate application binary (or support files) with a backdoor. Since these binaries may be routinely executed by applications or the user, the adversary can leverage this for persistent access to the host. An adversary may also modify a software binary such as an SSH client in order to persistently collect credentials during logins (i.e., [Modify Authentication Process](https://attack.mitre.org/techniques/T1556)).(Citation: Google Cloud Mandiant UNC3886 2024)\n\nAn adversary may also modify an existing binary by patching in malicious functionality (e.g., IAT Hooking/Entry point patching)(Citation: Unit42 Banking Trojans Hooking 2022) prior to the binary\u2019s legitimate execution. For example, an adversary may modify the entry point of a binary to point to malicious code patched in by the adversary before resuming normal execution flow.(Citation: ESET FontOnLake Analysis 2021)\n\nAfter modifying a binary, an adversary may attempt to [Impair Defenses](https://attack.mitre.org/techniques/T1562) by preventing it from updating (e.g., via the `yum-versionlock` command or `versionlock.list` file in Linux systems that use the yum package manager).(Citation: Google Cloud Mandiant UNC3886 2024)", "detection": "Collect and analyze signing certificate metadata and check signature validity on software that executes within the environment. Look for changes to client software that do not correlate with known software or patch cycles. \n\nConsider monitoring for anomalous behavior from client applications, such as atypical module loads, file reads/writes, or network connections.", "platforms": "Linux, Windows, macOS", "data sources": "File: File Creation, File: File Deletion, File: File Metadata, File: File Modification"}}, {"id": "t1_cap_3", "label": "Replace Binaries", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Replace Binaries", "capec_Typical_Severity": "High", "capec_Prerequisites": "The attacker must be able to place the malicious binary on the target machine.", "capec_Mitigations": "Insure that binaries commonly used by the system have the correct file permissions. Set operating system policies that restrict privilege elevation of non-Administrators. Use auditing tools to observe changes to system services."}}, {"id": "t1_and_3", "label": "AND", "type": "gate"}, {"id": "t1_cwe0_or_4", "label": "OR", "type": "gate"}, {"id": "t1_cwe0_or_5", "label": "OR", "type": "gate"}, {"id": "t1_cwe0_or_6", "label": "OR", "type": "gate"}, {"id": "t1_cwe_1", "label": "Use of Hard-coded Credentials", "type": "cwe", "metadata": {"CVE ID": "CVE-2014-5434 | CVE-2020-12047 | CVE-2014-5431 | CVE-2020-12045 | CVE-2020-12039", "cwe_Name": "Use of Hard-coded Credentials", "cwe // Build lookup: node_id -> {label, type}
var nodeInfo = {};
NODES_DATA.forEach(function(n) { nodeInfo[n.id] = n; });

// ── DOM refs ─────────────────────────────────────────────────────────────────
var panelCol  = document.getElementById('panel-col');
var panelBody = document.getElementById('panel-body');
var panelTitle= document.getElementById('panel-title');
var closeBtn  = document.getElementById('close-btn');
var svgScroll = document.getElementById('svg-scroll');

var selectedGroup = null;

// ── Open panel with node data ─────────────────────────────────────────────────
function showPanel(nodeId) {
  var info    = nodeInfo[nodeId] || {};
  var label   = info.label  || nodeId;
  var ntype   = info.type   || 'unknown';
  var htmlTbl = NODE_HTML[nodeId] || '<div class="meta-empty">No metadata recorded for this node.</div>';

  panelTitle.textContent = 'Node metadata';

  var badgeClass = 'badge-' + ntype;
  panelBody.innerHTML =
    '<p class="node-label-heading">' + escHtml(label) + '</p>' +
    '<span class="node-type-badge ' + badgeClass + '">' + escHtml(ntype) + '</span>' +
    htmlTbl;

  panelCol.classList.remove('hidden');
}

function closePanel() {
  panelCol.classList.add('hidden');
  if (selectedGroup) {
    selectedGroup.classList.remove('selected-node');
    selectedGroup = null;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Wire up node clicks ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var groups = svgScroll.querySelectorAll('[data-node-id]');
  groups.forEach(function(g) {
    g.addEventListener('click', function(ev) {
      ev.stopPropagation();
      var nodeId = g.getAttribute('data-node-id');

      // Deselect previous
      if (selectedGroup && selectedGroup !== g) {
        selectedGroup.classList.remove('selected-node');
      }
      // Toggle if same node clicked twice
      if (selectedGroup === g) {
        closePanel();
        return;
      }
      selectedGroup = g;
      g.classList.add('selected-node');
      showPanel(nodeId);
    });
  });

  // Click empty canvas area → close panel
  svgScroll.addEventListener('click', function() { closePanel(); });

  closeBtn.addEventListener('click', closePanel);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePanel();
  });
});
</script>
