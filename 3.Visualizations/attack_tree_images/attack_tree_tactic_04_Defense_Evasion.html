<!doctype html>

<head>

  <title>Attack Tree — Defense Evasion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; background: #f4f4f4;
                  font-family: Arial, Helvetica, sans-serif; font-size: 15px; }

    /* ── Two-column app layout ── */
    .app { display: flex; height: 100vh; gap: 0; overflow: hidden; }

    /* ── Left: graph canvas ── */
    .graph-col {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fff;
      border-right: 2px solid #d0d0d0;
    }
    .graph-header {
      padding: 10px 16px 8px;
      border-bottom: 1px solid #e0e0e0;
      background: #fff;
    }
    .graph-header h1 { margin: 0 0 6px; font-size: 20px; }
    .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .legend-item {
      padding: 3px 10px; border-radius: 4px;
      font-size: 13px; border: 1px solid rgba(0,0,0,.12);
    }
    .svg-scroll {
      flex: 1 1 auto;
      overflow: auto;
      padding: 12px;
      background: #fafafa;
    }
    .svg-scroll svg {
      /* keep native Graphviz size; user can scroll / zoom */
      width: auto;
      height: auto;
      display: block;
      cursor: default;
    }
    /* highlight hovered node groups */
    .svg-scroll [data-node-id] { cursor: pointer; }
    .svg-scroll [data-node-id]:hover ellipse,
    .svg-scroll [data-node-id]:hover polygon,
    .svg-scroll [data-node-id]:hover path {
      filter: brightness(0.88);
    }
    .selected-node ellipse,
    .selected-node polygon,
    .selected-node path {
      stroke: #1a6fc4 !important;
      stroke-width: 3px !important;
    }
    .graph-footer {
      padding: 6px 16px;
      font-size: 13px;
      color: #666;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }

    /* ── Right: metadata panel ── */
    .panel-col {
      flex: 0 0 400px;
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
      transition: flex-basis .2s;
    }
    .panel-col.hidden { flex: 0 0 0; overflow: hidden; }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #e0e0e0;
      background: #f8f8f8;
    }
    .panel-header h2 { margin: 0; font-size: 16px; }
    .close-btn {
      border: none; background: transparent;
      font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px;
      color: #555;
    }
    .close-btn:hover { color: #000; }
    .panel-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 14px;
    }
    .panel-placeholder {
      color: #888; font-style: italic; margin-top: 20px; text-align: center;
    }
    .node-label-heading {
      font-size: 17px; font-weight: 700;
      margin: 0 0 4px;
      word-break: break-word;
    }
    .node-type-badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
      margin-bottom: 10px;
    }

    /* Metadata table */
    .meta-table {
      width: 100%; border-collapse: collapse;
      margin-top: 8px; font-size: 14px;
    }
    .meta-table th {
      text-align: left; padding: 6px 8px;
      background: #f3f3f3; border-bottom: 1px solid #e0e0e0;
      font-weight: 600; width: 36%; vertical-align: top;
      word-break: break-word;
    }
    .meta-table td {
      padding: 6px 8px; border-bottom: 1px solid #eee;
      vertical-align: top; word-break: break-word;
    }
    .meta-empty { color: #888; font-style: italic; }

    /* Badge colours by node type */
    .badge-root    { background: #FFD700; color: #5a4200; }
    .badge-tactic  { background: #98FB98; color: #1a5c1a; }
    .badge-cwe     { background: #ADD8E6; color: #1a3a5c; }
    .badge-tech    { background: #90EE90; color: #1a5c1a; }
    .badge-subtech { background: #FFFACD; color: #5c5000; }
    .badge-capec   { background: #FFB6C1; color: #6b0a1e; }
    .badge-gate    { background: #FFCCCB; color: #7a1a00; }
  </style>
</head>

var NODE_HTML  = {"root": "<table class='meta-table'><tr><th>label</th><td>Compromise Device</td></tr></table>", "t3_tactic": "<table class='meta-table'><tr><th>tactic</th><td>Defense Evasion</td></tr></table>", "t3_cwe_0": "<table class='meta-table'><tr><th>cwe_Name</th><td>Incorrect Permission Assignment for Critical Resource</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>baseScore</th><td>9.4</td></tr><tr><th>baseSeverity</th><td>CRITICAL</td></tr><tr><th>attackVector</th><td>NETWORK</td></tr><tr><th>cwe_Abstraction</th><td>Class</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: N/A | Implementation:  | Installation: The developer may set loose permissions in order to minimize problems when the user first runs the program, then create documentation stating that permissions should be tightened. Since system administrators and users do not always read the documentation, this can result in insecure permissions being left unchanged. | Operation: N/A</td></tr><tr><th>cwe_Likelihood_Of_Exploit</th><td>High</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Confidentiality | Impact: Read Application Data, Read Files or Directories | Note: An attacker may be able to read sensitive information from the associated resource, such as credentials or configuration information stored in a file. || Scope: Access Control | Impact: Gain Privileges or Assume Identity | Note: An attacker may be able to modify critical properties of the associated resource to gain privileges, such as replacing a world-writable executable with a Trojan horse. || Scope: Integrity, Other | Impact: Modify Application Data, Other | Note: An attacker may be able to destroy or corrupt critical data in the associated resource, such as deletion of records from a database.</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Implementation | Description: N/A || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: Run the code in a &quot;jail&quot; or similar sandbox environment that enforces strict boundaries between the process and the operating system. This may effectively restrict which files can be accessed in a particular directory or which commands can be executed by the software. OS-level examples include the Unix chroot jail, AppArmor, and SELinux. In general, managed code may provide some protection. For example, java.io.FilePermission in the Java SecurityManager allows the software to specify restrictions on file operations. This may not be a feasible solution, and it only limits the impact to the operating system; the rest of the application may still be subject to compromise. Be careful to avoid CWE-243 and other weaknesses related to jails. || Phase: Implementation | Description: N/A || Phase: System Configuration | Description: N/A || Phase: Documentation | Description: N/A || Phase: Installation | Description: N/A || Phase: Operation | Description: N/A || Phase: Implementation | Description: N/A</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH</td></tr><tr><th>availabilityImpact</th><td>HIGH</td></tr><tr><th>exploitabilityScore</th><td>3.9</td></tr></table>", "t3_sub_0": "<table class='meta-table'><tr><th>technique_name</th><td>Hijack Execution Flow</td></tr><tr><th>subtechnique_name</th><td>Hijack Execution Flow: Services File Permissions Weakness</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>detection</th><td>Look for changes to binaries and service executables that may normally occur during software updates. If an executable is written, renamed, and/or moved to match an existing service executable, it could be detected and correlated with other suspicious behavior. Hashing of binaries and service executables could be used to detect replacement against historical data.\n\nLook for abnormal process call trees from typical processes and services and for execution of other commands that could relate to Discovery or other adversary techniques.</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>File: File Creation, File: File Modification, Process: Process Creation, Service: Service Metadata</td></tr></table>", "t3_cap_0": "<table class='meta-table'><tr><th>capec_Name</th><td>Accessing Functionality Not Properly Constrained by ACLs</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Skills_Required</th><td>Low: In order to discover unrestricted resources, the attacker does not need special tools or skills. They only have to observe the resources or access mechanisms invoked as each action is performed and then try and access those access mechanisms directly.</td></tr><tr><th>capec_Prerequisites</th><td>The application must be navigable in a manner that associates elements (subsections) of the application with ACLs. || The various resources, or individual URLs, must be somehow discoverable by the attacker || The administrator must have forgotten to associate an ACL or has associated an inappropriately permissive ACL with a particular navigable resource.</td></tr><tr><th>capec_Mitigations</th><td>In a J2EE setting, administrators can associate a role that is impossible for the authenticator to grant users, such as &quot;NoAccess&quot;, with all Servlets to which access is guarded by a limited number of servlets visible to, and accessible by, the user. Having done so, any direct access to those protected Servlets will be prohibited by the web container. In a more general setting, the administrator must mark every resource besides the ones supposed to be exposed to the user as accessible by a role impossible for the user to assume. The default security setting must be to deny access and then grant access only to those resources intended by business logic.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t3_sub_1": "<table class='meta-table'><tr><th>technique_name</th><td>Hijack Execution Flow</td></tr><tr><th>subtechnique_name</th><td>Hijack Execution Flow: Executable Installer File Permissions Weakness</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>detection</th><td>Look for changes to binaries and service executables that may normally occur during software updates. If an executable is written, renamed, and/or moved to match an existing service executable, it could be detected and correlated with other suspicious behavior. Hashing of binaries and service executables could be used to detect replacement against historical data.\n\nLook for abnormal process call trees from typical processes and services and for execution of other commands that could relate to Discovery or other adversary techniques.</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>File: File Creation, File: File Modification, Module: Module Load, Process: Process Creation, Service: Service Metadata</td></tr></table>", "t3_cap_1": "<table class='meta-table'><tr><th>capec_Name</th><td>Accessing Functionality Not Properly Constrained by ACLs</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Skills_Required</th><td>Low: In order to discover unrestricted resources, the attacker does not need special tools or skills. They only have to observe the resources or access mechanisms invoked as each action is performed and then try and access those access mechanisms directly.</td></tr><tr><th>capec_Prerequisites</th><td>The application must be navigable in a manner that associates elements (subsections) of the application with ACLs. || The various resources, or individual URLs, must be somehow discoverable by the attacker || The administrator must have forgotten to associate an ACL or has associated an inappropriately permissive ACL with a particular navigable resource.</td></tr><tr><th>capec_Mitigations</th><td>In a J2EE setting, administrators can associate a role that is impossible for the authenticator to grant users, such as &quot;NoAccess&quot;, with all Servlets to which access is guarded by a limited number of servlets visible to, and accessible by, the user. Having done so, any direct access to those protected Servlets will be prohibited by the web container. In a more general setting, the administrator must mark every resource besides the ones supposed to be exposed to the user as accessible by a role impossible for the user to assume. The default security setting must be to deny access and then grant access only to those resources intended by business logic.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t3_tech_2": "<table class='meta-table'><tr><th>technique_name</th><td>Abuse Elevation Control Mechanism</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>tech_description</th><td>Adversaries may circumvent mechanisms designed to control elevate privileges to gain higher-level permissions. Most modern systems contain native elevation control mechanisms that are intended to limit privileges that a user can perform on a machine. Authorization has to be granted to specific users in order to perform tasks that can be considered of higher risk.(Citation: TechNet How UAC Works)(Citation: sudo man page 2018) An adversary can perform several methods to take advantage of built-in control mechanisms in order to escalate privileges on a system.(Citation: OSX Keydnap malware)(Citation: Fortinet Fareit)</td></tr><tr><th>detection</th><td>Monitor the file system for files that have the setuid or setgid bits set. Also look for any process API calls for behavior that may be indicative of [Process Injection](https://attack.mitre.org/techniques/T1055) and unusual loaded DLLs through [DLL Search Order Hijacking](https://attack.mitre.org/techniques/T1574/001), which indicate attempts to gain access to higher privileged processes. On Linux, auditd can alert every time a user&#x27;s actual ID and effective ID are different (this is what happens when you sudo).\n\nConsider monitoring for &lt;code&gt;/usr/libexec/security_authtrampoline&lt;/code&gt; executions which may indicate that AuthorizationExecuteWithPrivileges is being executed. MacOS system logs may also indicate when AuthorizationExecuteWithPrivileges is being called. Monitoring OS API callbacks for the execution can also be a way to detect this behavior but requires specialized security tooling.\n\nOn Linux, auditd can alert every time a user&#x27;s actual ID and effective ID are different (this is what happens when you sudo). This technique is abusing normal functionality in macOS and Linux systems, but sudo has the ability to log all input and output based on the &lt;code&gt;LOG_INPUT&lt;/code&gt; and &lt;code&gt;LOG_OUTPUT&lt;/code&gt; directives in the &lt;code&gt;/etc/sudoers&lt;/code&gt; file.\n\nThere are many ways to perform UAC bypasses when a user is in the local administrator group on a system, so it may be difficult to target detection on all variations. Efforts should likely be placed on mitigation and collecting enough information on process launches and actions that could be performed before and after a UAC bypass is performed. Some UAC bypass methods rely on modifying specific, user-accessible Registry settings. Analysts should monitor Registry settings for unauthorized changes.</td></tr><tr><th>platforms</th><td>IaaS, Identity Provider, Linux, Office Suite, Windows, macOS</td></tr><tr><th>data sources</th><td>Command: Command Execution, File: File Metadata, File: File Modification, Process: OS API Execution, Process: Process Creation, Process: Process Metadata, User Account: User Account Modification, Windows Registry: Windows Registry Key Modification</td></tr><tr><th>permissions required</th><td>Administrator, User</td></tr></table>", "t3_cap_2": "<table class='meta-table'><tr><th>capec_Name</th><td>Privilege Abuse</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>Medium</td></tr><tr><th>capec_Skills_Required</th><td>Low: Adversary can leverage privileged features they already have access to without additional effort or skill. Adversary is only required to have access to an account with improper priveleges.</td></tr><tr><th>capec_Prerequisites</th><td>The target must have misconfigured their access control mechanisms such that sensitive information, which should only be accessible to more trusted users, remains accessible to less trusted users. || The adversary must have access to the target, albeit with an account that is less privileged than would be appropriate for the targeted resources.</td></tr><tr><th>capec_Mitigations</th><td>Configure account privileges such privileged/administrator functionality is not exposed to non-privileged/lower accounts.</td></tr><tr><th>capec_Consequences</th><td>Scope: Integrity | Impact: Modify Data || Scope: Confidentiality | Impact: Read Data || Scope: Authorization | Impact: Execute Unauthorized Commands || Scope: Authorization | Impact: Gain Privileges || Scope: Access Control, Authorization | Impact: Bypass Protection Mechanism</td></tr></table>", "t3_sub_3": "<table class='meta-table'><tr><th>technique_name</th><td>Subvert Trust Controls</td></tr><tr><th>subtechnique_name</th><td>Subvert Trust Controls: Code Signing</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>detection</th><td>Collect and analyze signing certificate metadata on software that executes within the environment to look for unusual certificate characteristics and outliers.</td></tr><tr><th>platforms</th><td>Windows, macOS</td></tr><tr><th>data sources</th><td>File: File Metadata</td></tr></table>", "t3_cap_3": "<table class='meta-table'><tr><th>capec_Name</th><td>Signing Malicious Code</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Typical_Severity</th><td>Very High</td></tr><tr><th>capec_Prerequisites</th><td>The targeted developer must use a signing key to sign code bundles. (Note that not doing this is not a defense - it only means that the adversary does not need to steal the signing key before forging code bundles in the developer&#x27;s name.)</td></tr><tr><th>capec_Mitigations</th><td>Ensure digital certificates are protected and inaccessible by unauthorized uses. || If a digital certificate has been compromised it should be revoked and regenerated. || Even if a piece of software has a valid and trusted digital signature, it should be assessed for any weaknesses and vulnerabilities.</td></tr></table>", "t3_sub_4": "<table class='meta-table'><tr><th>technique_name</th><td>Access Token Manipulation</td></tr><tr><th>subtechnique_name</th><td>Access Token Manipulation: Token Impersonation/Theft</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>detection</th><td>If an adversary is using a standard command-line shell, analysts can detect token manipulation by auditing command-line activity. Specifically, analysts should look for use of the &lt;code&gt;runas&lt;/code&gt; command. Detailed command-line logging is not enabled by default in Windows.(Citation: Microsoft Command-line Logging)\n\nAnalysts can also monitor for use of Windows APIs such as &lt;code&gt;DuplicateToken(Ex)&lt;/code&gt;, &lt;code&gt; ImpersonateLoggedOnUser &lt;/code&gt;, and &lt;code&gt; SetThreadToken &lt;/code&gt; and correlate activity with other suspicious behavior to reduce false positives that may be due to normal benign use by users and administrators.</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>Command: Command Execution, Process: OS API Execution</td></tr></table>", "t3_cap_4": "<table class='meta-table'><tr><th>capec_Name</th><td>Reusing Session IDs (aka Session Replay)</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Skills_Required</th><td>Low: If an attacker can steal a valid session ID, they can then try to be authenticated with that stolen session ID. || Medium: More sophisticated attack can be used to hijack a valid session from a user and spoof a legitimate user by reusing their valid session ID.</td></tr><tr><th>capec_Prerequisites</th><td>The target host uses session IDs to keep track of the users. || Session IDs are used to control access to resources. || The session IDs used by the target host are not well protected from session theft.</td></tr><tr><th>capec_Mitigations</th><td>Always invalidate a session ID after the user logout. || Setup a session time out for the session IDs. || Protect the communication between the client and server. For instance it is best practice to use SSL to mitigate adversary in the middle attacks (CAPEC-94). || Do not code send session ID with GET method, otherwise the session ID will be copied to the URL. In general avoid writing session IDs in the URLs. URLs can get logged in log files, which are vulnerable to an attacker. || Encrypt the session data associated with the session ID. || Use multifactor authentication.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t3_sub_5": "<table class='meta-table'><tr><th>technique_name</th><td>Use Alternate Authentication Material</td></tr><tr><th>subtechnique_name</th><td>Use Alternate Authentication Material: Web Session Cookie</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>detection</th><td>Monitor for anomalous access of websites and cloud-based applications by the same user in different locations or by different systems that do not match expected configurations.</td></tr><tr><th>platforms</th><td>IaaS, Office Suite, SaaS</td></tr><tr><th>data sources</th><td>Application Log: Application Log Content, Web Credential: Web Credential Usage</td></tr></table>", "t3_cap_5": "<table class='meta-table'><tr><th>capec_Name</th><td>Reusing Session IDs (aka Session Replay)</td></tr><tr><th>CVE ID</th><td>CVE-2020-12041</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Skills_Required</th><td>Low: If an attacker can steal a valid session ID, they can then try to be authenticated with that stolen session ID. || Medium: More sophisticated attack can be used to hijack a valid session from a user and spoof a legitimate user by reusing their valid session ID.</td></tr><tr><th>capec_Prerequisites</th><td>The target host uses session IDs to keep track of the users. || Session IDs are used to control access to resources. || The session IDs used by the target host are not well protected from session theft.</td></tr><tr><th>capec_Mitigations</th><td>Always invalidate a session ID after the user logout. || Setup a session time out for the session IDs. || Protect the communication between the client and server. For instance it is best practice to use SSL to mitigate adversary in the middle attacks (CAPEC-94). || Do not code send session ID with GET method, otherwise the session ID will be copied to the URL. In general avoid writing session IDs in the URLs. URLs can get logged in log files, which are vulnerable to an attacker. || Encrypt the session data associated with the session ID. || Use multifactor authentication.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t3_cwe_1": "<table class='meta-table'><tr><th>cwe_Name</th><td>Use of Hard-coded Credentials</td></tr><tr><th>CVE ID</th><td>CVE-2014-5434 | CVE-2020-12047 | CVE-2014-5431 | CVE-2020-12045 | CVE-2020-12039</td></tr><tr><th>baseScore</th><td>9.8 | 6.8 | 2.4</td></tr><tr><th>baseSeverity</th><td>CRITICAL | MEDIUM | LOW</td></tr><tr><th>attackVector</th><td>NETWORK | PHYSICAL</td></tr><tr><th>cwe_Abstraction</th><td>Base</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: REALIZATION: This weakness is caused during implementation of an architectural security tactic.</td></tr><tr><th>cwe_Likelihood_Of_Exploit</th><td>High</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Access Control | Impact: Bypass Protection Mechanism | Note: N/A || Scope: Integrity, Confidentiality, Availability, Access Control, Other | Impact: Read Application Data, Gain Privileges or Assume Identity, Execute Unauthorized Code or Commands, Other | Note: N/A</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Architecture and Design | Description: For outbound authentication: store passwords, keys, and other credentials outside of the code in a strongly-protected, encrypted configuration file or database that is protected from access by all outsiders, including other local users on the same system. Properly protect the key (CWE-320). If you cannot use encryption to protect the file, then make sure that the permissions are as restrictive as possible [REF-7]. In Windows environments, the Encrypted File System (EFS) may provide some protection. || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: For inbound authentication using passwords: apply strong one-way hashes to passwords and store those hashes in a configuration file or database with appropriate access control. That way, theft of the file/database still requires the attacker to try to crack the password. When handling an incoming password during authentication, take the hash of the password and compare it to the saved hash. Use randomly assigned salts for each separate hash that is generated. This increases the amount of computation that an attacker needs to conduct a brute-force attack, possibly limiting the effectiveness of the rainbow table method. || Phase: Architecture and Design | Description: For front-end to back-end connections: Three solutions are possible, although none are complete.</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH | LOW</td></tr><tr><th>availabilityImpact</th><td>HIGH | NONE</td></tr><tr><th>exploitabilityScore</th><td>3.9 | 0.9</td></tr></table>", "t3_sub_11": "<table class='meta-table'><tr><th>technique_name</th><td>Valid Accounts</td></tr><tr><th>subtechnique_name</th><td>Valid Accounts: Default Accounts</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>detection</th><td>Monitor whether default accounts have been activated or logged into. These audits should also include checks on any appliances and applications for default credentials or SSH keys, and if any are discovered, they should be updated immediately.</td></tr><tr><th>platforms</th><td>Containers, IaaS, Identity Provider, Linux, Network, Office Suite, SaaS, Windows, macOS</td></tr><tr><th>data sources</th><td>Logon Session: Logon Session Creation, User Account: User Account Authentication</td></tr></table>", "t3_cap_11": "<table class='meta-table'><tr><th>capec_Name</th><td>Try Common or Default Usernames and Passwords</td></tr><tr><th>CVE ID</th><td>CVE-2014-5434 | CVE-2020-12047 | CVE-2014-5431 | CVE-2020-12045 | CVE-2020-12039</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>Medium</td></tr><tr><th>capec_Typical_Severity</th><td>High</td></tr><tr><th>capec_Skills_Required</th><td>Low: An adversary just needs to gain access to common default usernames/passwords specific to the technologies used by the system. Additionally, a brute force attack leveraging common passwords can be easily realized if the user name is known.</td></tr><tr><th>capec_Prerequisites</th><td>The system uses one factor password based authentication.The adversary has the means to interact with the system.</td></tr><tr><th>capec_Mitigations</th><td>Delete all default account credentials that may be put in by the product vendor. || Implement a password throttling mechanism. This mechanism should take into account both the IP address and the log in name of the user. || Put together a strong password policy and make sure that all user created passwords comply with it. Alternatively automatically generate strong passwords for users. || Passwords need to be recycled to prevent aging, that is every once in a while a new password must be chosen.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges</td></tr></table>", "t3_cwe_2": "<table class='meta-table'><tr><th>cwe_Name</th><td>Improper Authentication</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>baseScore</th><td>9.8</td></tr><tr><th>baseSeverity</th><td>CRITICAL</td></tr><tr><th>attackVector</th><td>NETWORK</td></tr><tr><th>cwe_Abstraction</th><td>Class</td></tr><tr><th>cwe_Modes_Of_Introduction</th><td>Architecture and Design: N/A | Implementation: REALIZATION: This weakness is caused during implementation of an architectural security tactic.</td></tr><tr><th>cwe_Likelihood_Of_Exploit</th><td>High</td></tr><tr><th>cwe_Common_Consequences</th><td>Scope: Integrity, Confidentiality, Availability, Access Control | Impact: Read Application Data, Gain Privileges or Assume Identity, Execute Unauthorized Code or Commands | Note: This weakness can lead to the exposure of resources or functionality to unintended actors, possibly providing attackers with sensitive information or even execute arbitrary code.</td></tr><tr><th>cwe_Potential_Mitigations</th><td>Phase: Architecture and Design | Description: N/A</td></tr><tr><th>attackComplexity</th><td>LOW</td></tr><tr><th>privilegesRequired</th><td>NONE</td></tr><tr><th>userInteraction</th><td>NONE</td></tr><tr><th>confidentialityImpact</th><td>HIGH</td></tr><tr><th>availabilityImpact</th><td>HIGH</td></tr><tr><th>exploitabilityScore</th><td>3.9</td></tr></table>", "t3_tech_12": "<table class='meta-table'><tr><th>technique_name</th><td>Abuse Elevation Control Mechanism</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>tech_description</th><td>Adversaries may circumvent mechanisms designed to control elevate privileges to gain higher-level permissions. Most modern systems contain native elevation control mechanisms that are intended to limit privileges that a user can perform on a machine. Authorization has to be granted to specific users in order to perform tasks that can be considered of higher risk.(Citation: TechNet How UAC Works)(Citation: sudo man page 2018) An adversary can perform several methods to take advantage of built-in control mechanisms in order to escalate privileges on a system.(Citation: OSX Keydnap malware)(Citation: Fortinet Fareit)</td></tr><tr><th>detection</th><td>Monitor the file system for files that have the setuid or setgid bits set. Also look for any process API calls for behavior that may be indicative of [Process Injection](https://attack.mitre.org/techniques/T1055) and unusual loaded DLLs through [DLL Search Order Hijacking](https://attack.mitre.org/techniques/T1574/001), which indicate attempts to gain access to higher privileged processes. On Linux, auditd can alert every time a user&#x27;s actual ID and effective ID are different (this is what happens when you sudo).\n\nConsider monitoring for &lt;code&gt;/usr/libexec/security_authtrampoline&lt;/code&gt; executions which may indicate that AuthorizationExecuteWithPrivileges is being executed. MacOS system logs may also indicate when AuthorizationExecuteWithPrivileges is being called. Monitoring OS API callbacks for the execution can also be a way to detect this behavior but requires specialized security tooling.\n\nOn Linux, auditd can alert every time a user&#x27;s actual ID and effective ID are different (this is what happens when you sudo). This technique is abusing normal functionality in macOS and Linux systems, but sudo has the ability to log all input and output based on the &lt;code&gt;LOG_INPUT&lt;/code&gt; and &lt;code&gt;LOG_OUTPUT&lt;/code&gt; directives in the &lt;code&gt;/etc/sudoers&lt;/code&gt; file.\n\nThere are many ways to perform UAC bypasses when a user is in the local administrator group on a system, so it may be difficult to target detection on all variations. Efforts should likely be placed on mitigation and collecting enough information on process launches and actions that could be performed before and after a UAC bypass is performed. Some UAC bypass methods rely on modifying specific, user-accessible Registry settings. Analysts should monitor Registry settings for unauthorized changes.</td></tr><tr><th>platforms</th><td>IaaS, Identity Provider, Linux, Office Suite, Windows, macOS</td></tr><tr><th>data sources</th><td>Command: Command Execution, File: File Metadata, File: File Modification, Process: OS API Execution, Process: Process Creation, Process: Process Metadata, User Account: User Account Modification, Windows Registry: Windows Registry Key Modification</td></tr><tr><th>permissions required</th><td>Administrator, User</td></tr></table>", "t3_cap_12": "<table class='meta-table'><tr><th>capec_Name</th><td>Authentication Abuse</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>capec_Typical_Severity</th><td>Medium</td></tr><tr><th>capec_Prerequisites</th><td>An authentication mechanism or subsystem implementing some form of authentication such as passwords, digest authentication, security certificates, etc. which is flawed in some way.</td></tr></table>", "t3_sub_13": "<table class='meta-table'><tr><th>technique_name</th><td>Use Alternate Authentication Material</td></tr><tr><th>subtechnique_name</th><td>Use Alternate Authentication Material: Application Access Token</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>detection</th><td>Monitor access token activity for abnormal use and permissions granted to unusual or suspicious applications and APIs. Additionally, administrators should review logs for calls to the AWS Security Token Service (STS) and usage of GCP service accounts in order to identify anomalous actions.(Citation: AWS Logging IAM Calls)(Citation: GCP Monitoring Service Account Usage)</td></tr><tr><th>platforms</th><td>Containers, IaaS, Identity Provider, Office Suite, SaaS</td></tr><tr><th>data sources</th><td>Web Credential: Web Credential Usage</td></tr></table>", "t3_cap_13": "<table class='meta-table'><tr><th>capec_Name</th><td>Session Hijacking</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>capec_Likelihood_Of_Attack</th><td>High</td></tr><tr><th>capec_Typical_Severity</th><td>Very High</td></tr><tr><th>capec_Skills_Required</th><td>Low: Exploiting a poorly protected identity token is a well understood attack with many helpful resources available.</td></tr><tr><th>capec_Prerequisites</th><td>An application that leverages sessions to perform authentication.</td></tr><tr><th>capec_Mitigations</th><td>Properly encrypt and sign identity tokens in transit, and use industry standard session key generation mechanisms that utilize high amount of entropy to generate the session key. Many standard web and application servers will perform this task on your behalf. Utilize a session timeout for all sessions. If the user does not explicitly logout, terminate their session after this period of inactivity. If the user logs back in then a new session key should be generated.</td></tr><tr><th>capec_Consequences</th><td>Scope: Confidentiality, Integrity, Availability | Impact: Gain Privileges</td></tr></table>", "t3_tech_14": "<table class='meta-table'><tr><th>technique_name</th><td>Access Token Manipulation</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>tactics</th><td>Defense Evasion</td></tr><tr><th>tech_description</th><td>Adversaries may modify access tokens to operate under a different user or system security context to perform actions and bypass access controls. Windows uses access tokens to determine the ownership of a running process. A user can manipulate access tokens to make a running process appear as though it is the child of a different process or belongs to someone other than the user that started the process. When this occurs, the process also takes on the security context associated with the new token.\n\nAn adversary can use built-in Windows API functions to copy access tokens from existing processes; this is known as token stealing. These token can then be applied to an existing process (i.e. [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001)) or used to spawn a new process (i.e. [Create Process with Token](https://attack.mitre.org/techniques/T1134/002)). An adversary must already be in a privileged user context (i.e. administrator) to steal a token. However, adversaries commonly use token stealing to elevate their security context from the administrator level to the SYSTEM level. An adversary can then use a token to authenticate to a remote system as the account for that token if the account has appropriate permissions on the remote system.(Citation: Pentestlab Token Manipulation)\n\nAny standard user can use the &lt;code&gt;runas&lt;/code&gt; command, and the Windows API functions, to create impersonation tokens; it does not require access to an administrator account. There are also other mechanisms, such as Active Directory fields, that can be used to modify access tokens.</td></tr><tr><th>detection</th><td>If an adversary is using a standard command-line shell, analysts can detect token manipulation by auditing command-line activity. Specifically, analysts should look for use of the &lt;code&gt;runas&lt;/code&gt; command. Detailed command-line logging is not enabled by default in Windows.(Citation: Microsoft Command-line Logging)\n\nIf an adversary is using a payload that calls the Windows token APIs directly, analysts can detect token manipulation only through careful analysis of user network activity, examination of running processes, and correlation with other endpoint and network behavior. \n\nThere are many Windows API calls a payload can take advantage of to manipulate access tokens (e.g., &lt;code&gt;LogonUser&lt;/code&gt; (Citation: Microsoft LogonUser), &lt;code&gt;DuplicateTokenEx&lt;/code&gt;(Citation: Microsoft DuplicateTokenEx), and &lt;code&gt;ImpersonateLoggedOnUser&lt;/code&gt;(Citation: Microsoft ImpersonateLoggedOnUser)). Please see the referenced Windows API pages for more information.\n\nQuery systems for process and thread token information and look for inconsistencies such as user owns processes impersonating the local SYSTEM account.(Citation: BlackHat Atkinson Winchester Token Manipulation)\n\nLook for inconsistencies between the various fields that store PPID information, such as the EventHeader ProcessId from data collected via Event Tracing for Windows (ETW), Creator Process ID/Name from Windows event logs, and the ProcessID and ParentProcessID (which are also produced from ETW and other utilities such as Task Manager and Process Explorer). The ETW provided EventHeader ProcessId identifies the actual parent process.</td></tr><tr><th>platforms</th><td>Windows</td></tr><tr><th>data sources</th><td>Active Directory: Active Directory Object Modification, Command: Command Execution, Process: OS API Execution, Process: Process Creation, Process: Process Metadata, User Account: User Account Metadata</td></tr><tr><th>defenses bypassed</th><td>Heuristic Detection, Host Forensic Analysis, System Access Controls, Windows User Account Control</td></tr><tr><th>permissions required</th><td>Administrator, User</td></tr></table>", "t3_cap_14": "<table class='meta-table'><tr><th>capec_Name</th><td>Token Impersonation</td></tr><tr><th>CVE ID</th><td>CVE-2014-5432</td></tr><tr><th>capec_Typical_Severity</th><td>Medium</td></tr><tr><th>capec_Prerequisites</th><td>This pattern of attack is only applicable when a downstream user leverages tokens to verify identity, and then takes action based on that identity.</td></tr><tr><th>capec_Consequences</th><td>Scope: Integrity | Impact: Alter Execution Logic || Scope: Integrity | Impact: Gain Privileges || Scope: Integrity | Impact: Hide Activities</td></tr></table>"};
var NODES_DATA = [{"id": "root", "label": "Compromise Device", "type": "root"}, {"id": "t3_tactic", "label": "Defense Evasion", "type": "tactic", "metadata": {"tactic": "Defense Evasion"}}, {"id": "t3_cwe_0", "label": "Incorrect Permission Assignment for Critical Resource", "type": "cwe", "metadata": {"CVE ID": "CVE-2020-12041", "cwe_Name": "Incorrect Permission Assignment for Critical Resource", "cwe_Abstraction": "Class", "cwe_Modes_Of_Introduction": "Architecture and Design: N/A | Implementation:  | Installation: The developer may set loose permissions in order to minimize problems when the user first runs the program, then create documentation stating that permissions should be tightened. Since system administrators and users do not always read the documentation, this can result in insecure permissions being left unchanged. | Operation: N/A", "cwe_Likelihood_Of_Exploit": "High", "cwe_Common_Consequences": "Scope: Confidentiality | Impact: Read Application Data, Read Files or Directories | Note: An attacker may be able to read sensitive information from the associated resource, such as credentials or configuration information stored in a file. || Scope: Access Control | Impact: Gain Privileges or Assume Identity | Note: An attacker may be able to modify critical properties of the associated resource to gain privileges, such as replacing a world-writable executable with a Trojan horse. || Scope: Integrity, Other | Impact: Modify Application Data, Other | Note: An attacker may be able to destroy or corrupt critical data in the associated resource, such as deletion of records from a database.", "cwe_Potential_Mitigations": "Phase: Implementation | Description: N/A || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: Run the code in a \"jail\" or similar sandbox environment that enforces strict boundaries between the process and the operating system. This may effectively restrict which files can be accessed in a particular directory or which commands can be executed by the software. OS-level examples include the Unix chroot jail, AppArmor, and SELinux. In general, managed code may provide some protection. For example, java.io.FilePermission in the Java SecurityManager allows the software to specify restrictions on file operations. This may not be a feasible solution, and it only limits the impact to the operating system; the rest of the application may still be subject to compromise. Be careful to avoid CWE-243 and other weaknesses related to jails. || Phase: Implementation | Description: N/A || Phase: System Configuration | Description: N/A || Phase: Documentation | Description: N/A || Phase: Installation | Description: N/A || Phase: Operation | Description: N/A || Phase: Implementation | Description: N/A", "attackVector": "NETWORK", "baseScore": "9.4", "baseSeverity": "CRITICAL", "attackComplexity": "LOW", "privilegesRequired": "NONE", "userInteraction": "NONE", "confidentialityImpact": "HIGH", "availabilityImpact": "HIGH", "exploitabilityScore": "3.9"}}, {"id": "t3_sub_0", "label": "Hijack Execution Flow: Services File Permissions Weakness", "type": "subtech", "metadata": {"subtechnique_name": "Hijack Execution Flow: Services File Permissions Weakness", "technique_name": "Hijack Execution Flow", "tactics": "Defense Evasion", "detection": "Look for changes to binaries and service executables that may normally occur during software updates. If an executable is written, renamed, and/or moved to match an existing service executable, it could be detected and correlated with other suspicious behavior. Hashing of binaries and service executables could be used to detect replacement against historical data.\n\nLook for abnormal process call trees from typical processes and services and for execution of other commands that could relate to Discovery or other adversary techniques.", "platforms": "Windows", "data sources": "File: File Creation, File: File Modification, Process: Process Creation, Service: Service Metadata"}}, {"id": "t3_cap_0", "label": "Accessing Functionality Not Properly Constrained by ACLs", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Accessing Functionality Not Properly Constrained by ACLs", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "High", "capec_Skills_Required": "Low: In order to discover unrestricted resources, the attacker does not need special tools or skills. They only have to observe the resources or access mechanisms invoked as each action is performed and then try and access those access mechanisms directly.", "capec_Prerequisites": "The application must be navigable in a manner that associates elements (subsections) of the application with ACLs. || The various resources, or individual URLs, must be somehow discoverable by the attacker || The administrator must have forgotten to associate an ACL or has associated an inappropriately permissive ACL with a particular navigable resource.", "capec_Mitigations": "In a J2EE setting, administrators can associate a role that is impossible for the authenticator to grant users, such as \"NoAccess\", with all Servlets to which access is guarded by a limited number of servlets visible to, and accessible by, the user. Having done so, any direct access to those protected Servlets will be prohibited by the web container. In a more general setting, the administrator must mark every resource besides the ones supposed to be exposed to the user as accessible by a role impossible for the user to assume. The default security setting must be to deny access and then grant access only to those resources intended by business logic.", "capec_Consequences": "Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges"}}, {"id": "t3_and_0", "label": "AND", "type": "gate"}, {"id": "t3_sub_1", "label": "Hijack Execution Flow: Executable Installer File Permissions Weakness", "type": "subtech", "metadata": {"subtechnique_name": "Hijack Execution Flow: Executable Installer File Permissions Weakness", "technique_name": "Hijack Execution Flow", "tactics": "Defense Evasion", "detection": "Look for changes to binaries and service executables that may normally occur during software updates. If an executable is written, renamed, and/or moved to match an existing service executable, it could be detected and correlated with other suspicious behavior. Hashing of binaries and service executables could be used to detect replacement against historical data.\n\nLook for abnormal process call trees from typical processes and services and for execution of other commands that could relate to Discovery or other adversary techniques.", "platforms": "Windows", "data sources": "File: File Creation, File: File Modification, Module: Module Load, Process: Process Creation, Service: Service Metadata"}}, {"id": "t3_cap_1", "label": "Accessing Functionality Not Properly Constrained by ACLs", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Accessing Functionality Not Properly Constrained by ACLs", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "High", "capec_Skills_Required": "Low: In order to discover unrestricted resources, the attacker does not need special tools or skills. They only have to observe the resources or access mechanisms invoked as each action is performed and then try and access those access mechanisms directly.", "capec_Prerequisites": "The application must be navigable in a manner that associates elements (subsections) of the application with ACLs. || The various resources, or individual URLs, must be somehow discoverable by the attacker || The administrator must have forgotten to associate an ACL or has associated an inappropriately permissive ACL with a particular navigable resource.", "capec_Mitigations": "In a J2EE setting, administrators can associate a role that is impossible for the authenticator to grant users, such as \"NoAccess\", with all Servlets to ID are different (this is what happens when you sudo).\n\nConsider monitoring for <code>/usr/libexec/security_authtrampoline</code> executions which may indicate that AuthorizationExecuteWithPrivileges is being executed. MacOS system logs may also indicate when AuthorizationExecuteWithPrivileges is being called. Monitoring OS API callbacks for the execution can also be a way to detect this behavior but requires specialized security tooling.\n\nOn Linux, auditd can alert every time a user's actual ID and effective ID are different (this is what happens when you sudo). This technique is abusing normal functionality in macOS and Linux systems, but sudo has the ability to log all input and output based on the <code>LOG_INPUT</code> and <code>LOG_OUTPUT</code> directives in the <code>/etc/sudoers</code> file.\n\nThere are many ways to perform UAC bypasses when a user is in the local administrator group on a system, so it may be difficult to target detection on all variations. Efforts should likely be placed on mitigation and collecting enough information on process launches and actions that could be performed before and after a UAC bypass is performed. Some UAC bypass methods rely on modifying specific, user-accessible Registry settings. Analysts should monitor Registry settings for unauthorized changes.", "platforms": "IaaS, Identity Provider, Linux, Office Suite, Windows, macOS", "data sources": "Command: Command Execution, File: File Metadata, File: File Modification, Process: OS API Execution, Process: Process Creation, Process: Process Metadata, User Account: User Account Modification, Windows Registry: Windows Registry Key Modification", "permissions required": "Administrator, User"}}, {"id": "t3_cap_2", "label": "Privilege Abuse", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Privilege Abuse", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "Medium", "capec_Skills_Required": "Low: Adversary can leverage privileged features they already have access to without additional effort or skill. Adversary is only required to have access to an account with improper priveleges.", "capec_Prerequisites": "The target must have misconfigured their access control mechanisms such that sensitive information, which should only be accessible to more trusted users, remains accessible to less trusted users. || The adversary must have access to the target, albeit with an account that is less privileged than would be appropriate for the targeted resources.", "capec_Mitigations": "Configure account privileges such privileged/administrator functionality is not exposed to non-privileged/lower accounts.", "capec_Consequences": "Scope: Integrity | Impact: Modify Data || Scope: Confidentiality | Impact: Read Data || Scope: Authorization | Impact: Execute Unauthorized Commands || Scope: Authorization | Impact: Gain Privileges || Scope: Access Control, Authorization | Impact: Bypass Protection Mechanism"}}, {"id": "t3_and_2", "label": "AND", "type": "gate"}, {"id": "t3_sub_3", "label": "Subvert Trust Controls: Code Signing", "type": "subtech", "metadata": {"subtechnique_name": "Subvert Trust Controls: Code Signing", "technique_name": "Subvert Trust Controls", "tactics": "Defense Evasion", "detection": "Collect and analyze signing certificate metadata on software that executes within the environment to look for unusual certificate characteristics and outliers.", "platforms": "Windows, macOS", "data sources": "File: File Metadata"}}, {"id": "t3_cap_3", "label": "Signing Malicious Code", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Signing Malicious Code", "capec_Typical_Severity": "Very High", "capec_Prerequisites": "The targeted developer must use a signing key to sign code bundles. (Note that not doing this is not a defense - it only means that the adversary does not need to steal the signing key before forging code bundles in the developer's name.)", "capec_Mitigations": "Ensure digital certificates are protected and inaccessible by unauthorized uses. || If a digital certificate has been compromised it should be revoked and regenerated. || Even if a piece of software has a valid and trusted digital signature, it should be assessed for any weaknesses and vulnerabilities."}}, {"id": "t3_and_3", "label": "AND", "type": "gate"}, {"id": "t3_sub_4", "label": "Access Token Manipulation: Token Impersonation/Theft", "type": "subtech", "metadata": {"subtechnique_name": "Access Token Manipulation: Token Impersonation/Theft", "technique_name": "Access Token Manipulation", "tactics": "Defense Evasion", "detection": "If an adversary is using a standard command-line shell, analysts can detect token manipulation by auditing command-line activity. Specifically, analysts should look for use of the <code>runas</code> command. Detailed command-line logging is not enabled by default in Windows.(Citation: Microsoft Command-line Logging)\n\nAnalysts can also monitor for use of Windows APIs such as <code>DuplicateToken(Ex)</code>, <code> ImpersonateLoggedOnUser </code>, and <code> SetThreadToken </code> and correlate activity with other suspicious behavior to reduce false positives that may be due to normal benign use by users and administrators.", "platforms": "Windows", "data sources": "Command: Command Execution, Process: OS API Execution"}}, {"id": "t3_cap_4", "label": "Reusing Session IDs (aka Session Replay)", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Reusing Session IDs (aka Session Replay)", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "High", "capec_Skills_Required": "Low: If an attacker can steal a valid session ID, they can then try to be authenticated with that stolen session ID. || Medium: More sophisticated attack can be used to hijack a valid session from a user and spoof a legitimate user by reusing their valid session ID.", "capec_Prerequisites": "The target host uses session IDs to keep track of the users. || Session IDs are used to control access to resources. || The session IDs used by the target host are not well protected from session theft.", "capec_Mitigations": "Always invalidate a session ID after the user logout. || Setup a session time out for the session IDs. || Protect the communication between the client and server. For instance it is best practice to use SSL to mitigate adversary in the middle attacks (CAPEC-94). || Do not code send session ID with GET method, otherwise the session ID will be copied to the URL. In general avoid writing session IDs in the URLs. URLs can get logged in log files, which are vulnerable to an attacker. || Encrypt the session data associated with the session ID. || Use multifactor authentication.", "capec_Consequences": "Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges"}}, {"id": "t3_and_4", "label": "AND", "type": "gate"}, {"id": "t3_sub_5", "label": "Use Alternate Authentication Material: Web Session Cookie", "type": "subtech", "metadata": {"subtechnique_name": "Use Alternate Authentication Material: Web Session Cookie", "technique_name": "Use Alternate Authentication Material", "tactics": "Defense Evasion", "detection": "Monitor for anomalous access of websites and cloud-based applications by the same user in different locations or by different systems that do not match expected configurations.", "platforms": "IaaS, Office Suite, SaaS", "data sources": "Application Log: Application Log Content, Web Credential: Web Credential Usage"}}, {"id": "t3_cap_5", "label": "Reusing Session IDs (aka Session Replay)", "type": "capec", "metadata": {"CVE ID": "CVE-2020-12041", "capec_Name": "Reusing Session IDs (aka Session Replay)", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "High", "capec_Skills_Required": "Low: If an attacker can steal a valid session ID, they can then try to be authenticated with that stolen session ID. || Medium: More sophisticated attack can be used to hijack a valid session from a user and spoof a legitimate user by reusing their valid session ID.", "capec_Prerequisites": "The target host uses session IDs to keep track of the users. || Session IDs are used to control access to resources. || The session IDs used by the target host are not well protected from session theft.", "capec_Mitigations": "Always invalidate a session ID after the user logout. || Setup a session time out for the session IDs. || Protect the communication between the client and server. For instance it is best practice to use SSL to mitigate adversary in the middle attacks (CAPEC-94). || Do not code send session ID with GET method, otherwise the session ID will be copied to the URL. In general avoid writing session IDs in the URLs. URLs can get logged in log files, which are vulnerable to an attacker. || Encrypt the session data associated with the session ID. || Use multifactor authentication.", "capec_Consequences": "Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges"}}, {"id": "t3_and_5", "label": "AND", "type": "gate"}, {"id": "t3_cwe0_or_6", "label": "OR", "type": "gate"}, {"id": "t3_cwe0_or_7", "label": "OR", "type": "gate"}, {"id": "t3_cwe0_or_8", "label": "OR", "type": "gate"}, {"id": "t3_cwe0_or_9", "label": "OR", "type": "gate"}, {"id": "t3_cwe0_or_10", "label": "OR", "type": "gate"}, {"id": "t3_cwe_1", "label": "Use of Hard-coded Credentials", "type": "cwe", "metadata": {"CVE ID": "CVE-2014-5434 | CVE-2020-12047 | CVE-2014-5431 | CVE-2020-12045 | CVE-2020-12039", "cwe_Name": "Use of Hard-coded Credentials", "cwe_Abstraction": "Base", "cwe_Modes_Of_Introduction": "Architecture and Design: REALIZATION: This weakness is caused during implementation of an architectural security tactic.", "cwe_Likelihood_Of_Exploit": "High", "cwe_Common_Consequences": "Scope: Access Control | Impact: Bypass Protection Mechanism | Note: N/A || Scope: Integrity, Confidentiality, Availability, Access Control, Other | Impact: Read Application Data, Gain Privileges or Assume Identity, Execute Unauthorized Code or Commands, Other | Note: N/A", "cwe_Potential_Mitigations": "Phase: Architecture and Design | Description: For outbound authentication: store passwords, keys, and other credentials outside of the code in a strongly-protected, encrypted configuration file or database that is protected from access by all outsiders, including other local users on the same system. Properly protect the key (CWE-320). If you cannot use encryption to protect the file, then make sure that the permissions are as restrictive as possible [REF-7]. In Windows environments, the Encrypted File System (EFS) may provide some protection. || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: N/A || Phase: Architecture and Design | Description: For inbound authentication using passwords: apply strong one-way hashes to passwords and store those hashes in a configuration file or database with appropriate access control. That way, theft of the file/database still requires the attacker to try to crack the password. When handling an incoming password during authentication, take the hash of the password and compare it to the saved hash. Use randomly assigned salts for each separate hash that is generated. This increases the amount of computation that an attacker needs to conduct a brute-force attack, possibly limiting the effectiveness of the rainbow table method. || Phase: Architecture and Design | Description: For front-end to back-end connections: Three solutions are possible, although none are complete.", "attackVector": "NETWORK | PHYSICAL", "baseScore": "9.8 | 6.8 | 2.4", "baseSeverity": "CRITICAL | MEDIUM | LOW", "attackComplexity": "LOW", "privilegesRequired": "NONE", "userInteraction": "NONE", "confidentialityImpact": "HIGH | LOW", "availabilityImpact": "HIGH | NONE", "exploitabilityScore": "3.9 | 0.9"}}, {"id": "t3_sub_11", "label": "Valid Accounts: Default Accounts", "type": "subtech", "metadata": {"subtechnique_name": "Valid Accounts: Default Accounts", "technique_name": "Valid Accounts", "tactics": "Defense Evasion", "detection": "Monitor whether default accounts have been activated or logged into. These audits should also include checks on any appliances and applications for default credentials or SSH keys, and if any are discovered, they should be updated immediately.", "platforms": "Containers, IaaS, Identity Provider, Linux, Network, Office Suite, SaaS, Windows, macOS", "data sources": "Logon Session: Logon Session Creation, User Account: User Account Authentication"}}, {"id": "t3_cap_11", "label": "Try Common or Default Usernames and Passwords", "type": "capec", "metadata": {"CVE ID": "CVE-2014-5434 | CVE-2020-12047 | CVE-2014-5431 | CVE-2020-12045 | CVE-2020-12039", "capec_Name": "Try Common or Default Usernames and Passwords", "capec_Likelihood_Of_Attack": "Medium", "capec_Typical_Severity": "High", "capec_Skills_Required": "Low: An adversary just needs to gain access to common default usernames/passwords specific to the technologies used by the system. Additionally, a brute force attack leveraging common passwords can be easily realized if the user name is known.", "capec_Prerequisites": "The system uses one factor password based authentication.The adversary has the means to interact with the system.", "capec_Mitigations": "Delete all default account credentials that may be put in by the product vendor. || Implement a password throttling mechanism. This mechanism should take into account both the IP address and the log in name of the user. || Put together a strong password policy and make sure that all user created passwords comply with it. Alternatively automatically generate strong passwords for users. || Passwords need to be recycled to prevent aging, that is every once in a while a new password must be chosen.", "capec_Consequences": "Scope: Confidentiality, Access Control, Authorization | Impact: Gain Privileges"}}, {"id": "t3_and_11", "label": "AND", "type": "gate"}, {"id": "t3_cwe_2", "label": "Improper Authentication", "type": "cwe", "metadata": {"CVE ID": "CVE-2014-5432", "cwe_Name": "Improper Authentication", "cwe_Abstraction": "Class", "cwe_Modes_Of_Introduction": "Architecture and Design: N/A | Implementation: REALIZATION: This weakness is caused during implementation of an architectural security tactic.", "cwe_Likelihood_Of_Exploit": "High", "cwe_Common_Consequences": "Scope: Integrity, Confidentiality, Availability, Access Control | Impact: Read Application Data, Gain Privileges or Assume Identity, Execute Unauthorized Code or Commands | Note: This weakness can lead to the exposure of resources or functionality to unintended actors, possibly providing attackers with sensitive information or even execute arbitrary code.", "cwe_Potential_Mitigations": "Phase: Architecture and Design | Description: N/A", "attackVector": "NETWORK", "baseScore": "9.8", "baseSeverity": "CRITICAL", "attackComplexity": "LOW", "privilegesRequired": "NONE", "userInteraction": "NONE", "confidentialityImpact": "HIGH", "availabilityImpact": "HIGH", "exploitabilityScore": "3.9"}}, {"id": "t3_tech_12", "label": "Abuse Elevation Control Mechanism", "type": "tech", "metadata": {"CVE ID": "CVE-2014-5432", "technique_name": "Abuse Elevation Control Mechanism", "tactics": "Defense Evasion", "tech_description": "Adversaries may circumvent mechanisms designed to control elevate privileges to gain higher-level permissions. Most modern systems contain native elevation control mechanisms that are intended to limit privileges that a user can perform on a machine. Authorization has to be granted to specific users in order to perform tasks that can be considered of higher risk.(Citation: TechNet How UAC Works)(Citation: sudo man page 2018) An adversary can perform several methods to take advantage of built-in control mechanisms in order to escalate privileges on a system.(Citation: OSX Keydnap malware)(Citation: Fortinet Fareit)", "detection": "Monitor the file system for files that have the setuid or setgid bits set. Also look for any process API calls for behavior that may be indicative of [Process Injection](https://attack.mitre.org/techniques/T1055) and unusual loaded DLLs through [DLL Search Order Hijacking](https://attack.mitre.org/techniques/T1574/001), which indicate attempts to gain access to higher privileged processes. On Linux, auditd can alert every time a user's actual ID and effective ID are different (this is what happens when you sudo).\n\nConsider monitoring for <code>/usr/libexec/security_authtrampoline</code> executions which may indicate that AuthorizationExecuteWithPrivileges is being executed. MacOS system logs may also indicate when AuthorizationExecuteWithPrivileges is being called. Monitoring OS API callbacks for the execution can also be a way to detect this behavior but requires specialized security tooling.\n\nOn Linux, auditd can alert every time a user's actual ID and effective ID are different (this is what happens when you sudo). This technique is abusing normal functionality in macOS and Linux systems, but sudo has the ability to log all input and output based on the <code>LOG_INPUT</code> and <code>LOG_OUTPUT</code> directives in the <code>/etc/sudoers</code> file.\n\nThere are many ways to perform UAC bypasses when a user is in the local administrator group on a system, so it may be difficult to target detection on all variations. Efforts should likely be placed on mitigation and collecting enough information on process launches and actions that could be performed before and after a UAC bypass is performed. Some UAC bypass methods rely on modifying specific, user-accessible Registry settings. Analysts should monitor Registry settings for unauthorized changes.", "platforms": "IaaS, Identity Provider, Linux, Office Suite, Windows, macOS", "data sources": "Command: Command Execution, File: File Metadata, File: File Modification, Process: OS API Execution, Process: Process Creation, Process: Process Metadata, User Account: User Account Modification, Windows Registry: Windows Registry Key Modification", "permissions required": "Administrator, User"}}, {"id": "t3_cap_12", "label": "Authentication Abuse", "type": "capec", "metadata": {"CVE ID": "CVE-2014-5432", "capec_Name": "Authentication Abuse", "capec_Typical_Severity": "Medium", "capec_Prerequisites": "An authentication mechanism or subsystem implementing some form of authentication such as passwords, digest authentication, security certificates, etc. which is flawed in some way."}}, {"id": "t3_and_12", "label": "AND", "type": "gate"}, {"id": "t3_sub_13", "label": "Use Alternate Authentication Material: Application Access Token", "type": "subtech", "metadata": {"subtechnique_name": "Use Alternate Authentication Material: Application Access Token", "technique_name": "Use Alternate Authentication Material", "tactics": "Defense Evasion", "detection": "Monitor access token activity for abnormal use and permissions granted to unusual or suspicious applications and APIs. Additionally, administrators should review logs for calls to the AWS Security Token Service (STS) and usage of GCP service accounts in order to identify anomalous actions.(Citation: AWS Logging IAM Calls)(Citation: GCP Monitoring Service Account Usage)", "platforms": "Containers, IaaS, Identity Provider, Office Suite, SaaS", "data sources": "Web Credential: Web Credential Usage"}}, {"id": "t3_cap_13", "label": "Session Hijacking", "type": "capec", "metadata": {"CVE ID": "CVE-2014-5432", "capec_Name": "Session Hijacking", "capec_Likelihood_Of_Attack": "High", "capec_Typical_Severity": "Very High", "capec_Skills_Required": "Low: Exploiting a poorly protected identity token is a well understood attack with many helpful resources available.", "capec_Prerequisites": "An application that leverages sessions to perform authentication.", "capec_Mitigations": "Properly encrypt and sign identity tokens in transit, and use industry standard session key generation mechanisms that utilize high amount of entropy to generate the session key. Many standard web and application servers will perform this task on your behalf. Utilize a session timeout for all sessions. If the user does not explicitly logout, terminate their session after this period of inactivity. If the user logs back in then a new session key should be generated.", "capec_Consequences": "Scope: Confidentiality, Integrity, Availability | Impact: Gain Privileges"}}, {"id": "t3_and_13", "label": "AND", "type": "gate"}, {"id": "t3_tech_14", "label": "Access Token Manipulation", "type": "tech", "metadata": {"CVE ID": "CVE-2014-5432", "technique_name": "Access Token Manipulation", "tactics": "Defense Evasion", "tech_description": "Adversaries may modify access tokens to operate under a different user or system security context to perform actions and bypass access controls. Windows uses access tokens to determine the ownership of a running process. A user can manipulate access tokens to make a running process appear as though it is the child of a different process or belongs to someone other than the user that started the process. When this occurs, the process also takes on the security context associated with the new token.\n\nAn adversary can use built-in Windows API functions to copy access tokens from existing processes; this is known as token stealing. These token can then be applied to an existing process (i.e. [Token Impersonation/Theft](https://attack.mitre.org/techniques/T1134/001)) or used to spawn a new process (i.e. [Create Process with Token](https://attack.mitre.org/techniques/T1134/002)). An adversary must already be in a privileged user context (i.e. administrator) to steal a token. However, adversaries commonly use token stealing to elevate their security context from the administrator level to the SYSTEM level. An adversary can then use a token to authenticate to a remote system as the account for that token if the account has appropriate permissions on the remote system.(Citation: Pentestlab Token Manipulation)\n\nAny standard user can use the <code>runas</code> command, and the Windows API functions, to create impersonation tokens; it does not require access to an administrator account. There are also other mechanisms, such as Active Directory fields, that can be used to modify access tokens.", "detection": "If an adversary is using a standard command-line shell, analysts can detect token manipulation by auditing command-line activity. Specifically, analysts should look for use of the <code>runas</code> command. Detailed command-line logging is not enabled by default in Windows.(Citation: Microsoft Command-line Logging)\n\nIf an adversary is using a payload that calls the Windows token APIs directly, analysts can detect token manipulation only through careful analysis of user network activity, examination of running processes, and correlation with other endpoint and network behavior. \n\nThere are many Windows API calls a payload can take advantage of to manipulate access tokens (e.g., <code>LogonUser</code> (Citation: Microsoft LogonUser), <code>DuplicateTokenEx</code>(Citation: Microsoft DuplicateTokenEx), and <code>ImpersonateLoggedOnUser</code>(Citation: Microsoft ImpersonateLoggedOnUser)). Please see the referenced Windows API pages for more information.\n\nQuery systems for process and thread token information and look for inconsistencies such as user owns processes impersonating the local SYSTEM account.(Citation: BlackHat Atkinson Winchester Token Manipulation)\n\nLook for inconsistencies between the various fields that store PPID information, such as the EventHeader ProcessId from data collected via Event Tracing for Windows (ETW), Creator Process ID/Name from Windows event logs, and the ProcessID and ParentProcessID (which are also produced from ETW and other utilities such as Task Manager and Process Explorer). The ETW provided EventHeader ProcessId identifies the actual parent process.", "platforms": "Windows", "data sources": "Active Directory: Active Directory Object Modification, Command: Command Execution, Process: OS API Execution, Process: Process Creation, Process: Process Metadata, User Account: User Account Metadata", "defenses bypassed": "Heuristic Detection, Host Forensic Analysis, System Access Controls, Windows User Account Control", "permissions required": "Administrator, User"}}, {"id": "t3_cap_14", "label": "Token Impersonation", "type": "capec", "metadata": {"CVE ID": "CVE-2014-5432", "capec_Name": "Token Impersonation", "capec_Typical_Severity": "Medium", "capec_Prerequisites": "This pattern of attack is only applicable when a downstream user leverages tokens to verify identity, and then takes action based on that identity.", "capec_Consequences": "Scope: Integrity | Impact: Alter Execution Logic || Scope: Integrity | Impact: Gain Privileges || Scope: Integrity | Impact: Hide Activities"}}, {"id": "t3_and_14", "label": "AND", "type": "gate"}, {"id": "t3_cwe2_or_15", "label": "OR", "type": "gate"}, {"id": "t3_cwe2_or_16", "label": "OR", "type": "gate"}, {"id": "t3_tac_or_17", "label": "OR", "type": "gate"}, {"id": "t3_tac_or_18", "label": "OR", "type": "gate"}];

// Build lookup: node_id -> {label, type}
var nodeInfo = {};
NODES_DATA.forEach(function(n) { nodeInfo[n.id] = n; });

// ── DOM refs ─────────────────────────────────────────────────────────────────
var panelCol  = document.getElementById('panel-col');
var panelBody = document.getElementById('panel-body');
var panelTitle= document.getElementById('panel-title');
var closeBtn  = document.getElementById('close-btn');
var svgScroll = document.getElementById('svg-scroll');

var selectedGroup = null;

// ── Open panel with node data ─────────────────────────────────────────────────
function showPanel(nodeId) {
  var info    = nodeInfo[nodeId] || {};
  var label   = info.label  || nodeId;
  var ntype   = info.type   || 'unknown';
  var htmlTbl = NODE_HTML[nodeId] || '<div class="meta-empty">No metadata recorded for this node.</div>';

  panelTitle.textContent = 'Node metadata';

  var badgeClass = 'badge-' + ntype;
  panelBody.innerHTML =
    '<p class="node-label-heading">' + escHtml(label) + '</p>' +
    '<span class="node-type-badge ' + badgeClass + '">' + escHtml(ntype) + '</span>' +
    htmlTbl;

  panelCol.classList.remove('hidden');
}

function closePanel() {
  panelCol.classList.add('hidden');
  if (selectedGroup) {
    selectedGroup.classList.remove('selected-node');
    selectedGroup = null;
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Wire up node clicks ───────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var groups = svgScroll.querySelectorAll('[data-node-id]');
  groups.forEach(function(g) {
    g.addEventListener('click', function(ev) {
      ev.stopPropagation();
      var nodeId = g.getAttribute('data-node-id');

      // Deselect previous
      if (selectedGroup && selectedGroup !== g) {
        selectedGroup.classList.remove('selected-node');
      }
      // Toggle if same node clicked twice
      if (selectedGroup === g) {
        closePanel();
        return;
      }
      selectedGroup = g;
      g.classList.add('selected-node');
      showPanel(nodeId);
    });
  });

  // Click empty canvas area → close panel
  svgScroll.addEventListener('click', function() { closePanel(); });

  closeBtn.addEventListener('click', closePanel);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePanel();
  });
});
</script>
</body>
